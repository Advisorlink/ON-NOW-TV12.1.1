<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>OnNow TV V2 — Launcher Mockup (1920×1080)</title>
<style>
:root {
    /* Per-state accent colors — these recolour the bottom-dock
     * focus glow, the FEATURED kicker, and the vertical pagination
     * dots so each section feels distinct, exactly like the four
     * mockups provided by the user. */
    --accent-blue:   #2BB6FF;
    --accent-cyan:   #4FE3FF;
    --accent-teal:   #2EEAC2;
    --accent-blue2:  #38B8FF;

    --bg-deep:       #04060B;
    --bg-mid:        #060B16;
    --txt-primary:   #F4F7FB;
    --txt-secondary: #8EA0B7;
    --txt-tertiary:  #5D6E85;
    --dock-bg:       rgba(10, 18, 32, 0.55);
    --dock-border:   rgba(255, 255, 255, 0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-deep);
    color: var(--txt-primary);
    -webkit-font-smoothing: antialiased;
}

.stage {
    position: relative;
    width: 1920px;
    height: 1080px;
    background:
        radial-gradient(ellipse 60% 40% at 50% 50%, rgba(56, 130, 255, 0.04), transparent 70%),
        var(--bg-deep);
    overflow: hidden;
}

/* ───────── Top status bar ───────── */
.topbar {
    position: absolute;
    top: 24px;
    left: 32px;
    right: 32px;
    height: 84px;
    border-radius: 28px;
    background: rgba(8, 14, 26, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(18px);
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 0 36px;
}

.topbar .left {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 18px;
    font-weight: 500;
    color: var(--txt-primary);
}

.topbar .wifi-icon {
    width: 26px;
    height: 26px;
    color: var(--txt-primary);
}

.topbar .center {
    display: flex;
    align-items: center;
    gap: 8px;
}

.topbar .logo-play {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(43, 182, 255, 0.32), transparent 60%);
    display: grid;
    place-items: center;
}

.topbar .logo-play svg { width: 30px; height: 30px; color: #38C2FF; }
.topbar .logo-text {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--txt-primary);
}
.topbar .logo-text .v2-blue {
    color: var(--accent-blue);
    text-shadow: 0 0 14px rgba(43, 182, 255, 0.45);
}

.topbar .right {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 24px;
    font-size: 18px;
    color: var(--txt-primary);
}
.topbar .right .divider {
    width: 1px;
    height: 26px;
    background: rgba(255, 255, 255, 0.18);
}
.topbar .right .time {
    font-size: 28px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

/* ───────── Vertical pagination dots (left rail) ───────── */
.paginator {
    position: absolute;
    top: 280px;
    left: 70px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 26px;
    z-index: 3;
}
.paginator .seg {
    width: 4px;
    height: 64px;
    border-radius: 4px;
    background: rgba(255, 255, 255, 0.10);
}
.paginator .seg.active {
    background: var(--accent);
    box-shadow: 0 0 18px var(--accent);
}
.paginator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.18);
}
.paginator .dot.active {
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
}

/* ───────── Left content column ───────── */
.content {
    position: absolute;
    left: 168px;
    top: 230px;
    width: 720px;
    height: 540px;
    display: flex;
    flex-direction: column;
    gap: 30px;
}
.kicker {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--accent);
    text-shadow: 0 0 14px var(--accent);
}
.title {
    font-size: 96px;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1.0;
    color: var(--txt-primary);
}
.title-period {
    color: var(--accent);
    text-shadow: 0 0 22px var(--accent);
}
.tagline {
    font-size: 30px;
    font-weight: 500;
    color: var(--txt-primary);
    line-height: 1.3;
    margin-top: -6px;
}
.desc {
    font-size: 21px;
    color: var(--txt-secondary);
    line-height: 1.65;
    font-weight: 400;
    max-width: 600px;
}
.cta {
    margin-top: 14px;
    align-self: flex-start;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    padding: 20px 36px;
    color: var(--txt-primary);
    font-size: 21px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 18px;
}
.cta .arrow {
    width: 32px;
    height: 32px;
    display: inline-grid;
    place-items: center;
}

/* ───────── Right hero illustration column ───────── */
.hero {
    position: absolute;
    right: 0;
    top: 130px;
    width: 1060px;
    height: 720px;
    display: grid;
    place-items: center;
    overflow: hidden;
    /* Soft gradient mask along the left edge so the hero blends
     * into the content column without a hard seam. */
    mask: linear-gradient(to right, transparent 0%, black 16%, black 100%);
    -webkit-mask: linear-gradient(to right, transparent 0%, black 16%, black 100%);
}
.hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
}

/* ───────── Bottom dock ───────── */
.dock {
    position: absolute;
    left: 32px;
    right: 32px;
    bottom: 36px;
    height: 184px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 18px;
}
.tile {
    position: relative;
    background: var(--dock-bg);
    border: 1px solid var(--dock-border);
    border-radius: 22px;
    backdrop-filter: blur(14px);
    padding: 26px 30px;
    display: grid;
    grid-template-columns: 64px 1fr;
    grid-template-rows: 1fr 1fr;
    column-gap: 22px;
    align-items: center;
}
.tile .icon {
    grid-row: 1 / 3;
    width: 64px;
    height: 64px;
    display: grid;
    place-items: center;
    color: var(--txt-primary);
}
.tile .icon svg { width: 100%; height: 100%; stroke-width: 1.5; }
.tile .label {
    align-self: end;
    font-size: 26px;
    font-weight: 600;
    color: var(--txt-primary);
    letter-spacing: -0.2px;
    line-height: 1;
}
.tile .sub {
    align-self: start;
    font-size: 16px;
    color: var(--txt-secondary);
    margin-top: 6px;
    font-weight: 400;
}

/* Focused tile — bright neon border + glow.
 * The accent colour is supplied via --accent on .stage. */
.tile.focused {
    border-color: var(--accent);
    background: rgba(10, 26, 48, 0.65);
    box-shadow:
        0 0 0 1.5px var(--accent),
        0 0 48px rgba(43, 182, 255, 0.42),
        inset 0 0 24px rgba(43, 182, 255, 0.10);
}
.tile.focused .icon { color: var(--accent); }
.tile.focused .label { color: var(--txt-primary); }

/* Subtle dock reflection under the bar — matches the screenshot. */
.dock-reflection {
    position: absolute;
    left: 32px;
    right: 32px;
    bottom: 0;
    height: 36px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.04), transparent);
    border-radius: 22px;
    transform: scaleY(-1);
    opacity: 0.35;
    pointer-events: none;
    mask: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    -webkit-mask: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
}
</style>
</head>

const qs = new URLSearchParams(window.location.search);
const stateKey = qs.get('s') || 'livetv';
const state = STATES[stateKey] || STATES.livetv;

document.documentElement.style.setProperty('--accent', state.accent);

const titleEl = document.getElementById('title');
titleEl.innerHTML = `${state.title[0]}<span class="title-period">${state.title[1]}</span>`;

document.getElementById('tagline').textContent = state.tagline;
document.getElementById('desc').textContent = state.desc;
document.getElementById('hero').innerHTML = HEROES[state.heroSvg] || '';

/* Build dock */
const dockEl = document.getElementById('dock');
dockEl.innerHTML = DOCK_ITEMS.map((it, i) => `
    <div class="tile ${i === state.focusedIdx ? 'focused' : ''}" data-key="${it.key}">
        <div class="icon">${ICONS[it.icon]}</div>
        <div class="label">${it.label}</div>
        <div class="sub">${it.sub}</div>
    </div>
`).join('');

/* Build paginator (4 dots, 1 active = first) */
const paginatorEl = document.getElementById('paginator');
paginatorEl.innerHTML = `
    <div class="seg active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
`;

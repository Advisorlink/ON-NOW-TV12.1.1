<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Manrope:wght@300;400;600&family=Outfit:wght@200;400;700;900&family=Playfair+Display:wght@400;700;900&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { width: 1920px; height: 1080px; overflow: hidden; background: #000; color: #fff; margin:0; position:relative; }
        .glass { background: rgba(20,20,20,0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-light { background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
        .text-shadow { text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .text-shadow-glow { text-shadow: 0 0 20px currentColor; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <img src="https://images.pexels.com/photos/18867525/pexels-photo-18867525.jpeg" class="absolute inset-0 w-full h-full object-cover scale-105 filter saturate-110 brightness-90" />
    <div class="absolute inset-0 bg-gradient-to-r from-[#110011]/95 via-[#220022]/70 to-transparent z-10"></div>
    
    <!-- Top HUD Elements -->
    <div class="absolute top-12 left-14 z-50">
        <div class="flex items-center space-x-4 bg-black/60 backdrop-blur-xl px-5 py-2.5 rounded border border-white/10 font-['Manrope'] shadow-2xl">
            <div class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div>
            <span class="text-white/90 text-[15px] font-bold tracking-widest">▶︎ EXOPLAYER</span>
        </div>
    </div>
    <div class="absolute top-12 right-14 z-50">
        <div class="flex items-center space-x-5 glass-light px-6 py-2.5 rounded font-['Manrope']">
            <span class="text-white/70 text-sm tracking-widest font-semibold">BUF 12s &middot; 6.2Mbps &middot; ExoPlayer</span>
            <div class="flex space-x-1.5 items-end h-4">
                <div class="w-1 h-2 bg-white/40"></div>
                <div class="w-1 h-3 bg-white/60"></div>
                <div class="w-1 h-4 bg-white animate-pulse shadow-[0_0_8px_rgba(255,255,255,0.8)]"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="absolute bottom-24 left-20 w-[55%] z-40 font-['Manrope']">
        <p class="text-[13px] text-yellow-500 tracking-[0.4em] mb-5 uppercase font-bold text-shadow-glow">BABA YAGA</p>
        <h1 class="font-['Unbounded'] font-bold tracking-tight text-6xl text-white drop-shadow-[0_0_25px_rgba(255,0,128,0.8)] leading-[1.1] mb-8">JOHN WICK: CHAPTER 4</h1>
        
        <div class="flex flex-wrap items-center gap-4 mb-8">
            <span class="border border-yellow-500/60 bg-black/80 text-yellow-500 px-4 py-1.5 text-xs tracking-widest font-bold shadow-[0_0_15px_rgba(234,179,8,0.2)]">2023</span><span class="border border-yellow-500/60 bg-black/80 text-yellow-500 px-4 py-1.5 text-xs tracking-widest font-bold shadow-[0_0_15px_rgba(234,179,8,0.2)]">169 MIN</span><span class="border border-yellow-500/60 bg-black/80 text-yellow-500 px-4 py-1.5 text-xs tracking-widest font-bold shadow-[0_0_15px_rgba(234,179,8,0.2)]">R</span><span class="border border-yellow-500/60 bg-black/80 text-yellow-500 px-4 py-1.5 text-xs tracking-widest font-bold shadow-[0_0_15px_rgba(234,179,8,0.2)]">4K DOLBY VISION</span><span class="border border-yellow-500/60 bg-black/80 text-yellow-500 px-4 py-1.5 text-xs tracking-widest font-bold shadow-[0_0_15px_rgba(234,179,8,0.2)]">MP4 · 60GB</span>
        </div>
        
        <p class="text-[22px] text-white/80 leading-relaxed font-light line-clamp-3 max-w-3xl text-shadow">
            John Wick uncovers a path to defeating The High Table. But before he can earn his freedom, Wick must face off against a new enemy with powerful alliances across the globe.
        </p>
    </div>
</body>
</html>

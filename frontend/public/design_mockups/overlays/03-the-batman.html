<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;700&family=Manrope:wght@300;400;600&family=Outfit:wght@200;400;700;900&family=Playfair+Display:wght@400;700;900&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { width: 1920px; height: 1080px; overflow: hidden; background: #000; color: #fff; margin:0; position:relative; }
        .glass { background: rgba(20,20,20,0.6); backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.08); }
        .glass-light { background: rgba(255,255,255,0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.15); }
        .text-shadow { text-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .text-shadow-glow { text-shadow: 0 0 20px currentColor; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">

    <img src="https://images.unsplash.com/photo-1757942410771-f53048100e3a?crop=entropy&cs=srgb&fm=jpg&ixid=M3w4NjA2OTV8MHwxfHNlYXJjaHwxfHxkYXJrJTIwZ290aGljJTIwY2l0eSUyMG5pZ2h0fGVufDB8fHx8MTc3OTM1NDI3OHww&ixlib=rb-4.1.0&q=85" class="absolute inset-0 w-full h-full object-cover scale-105 filter saturate-110 brightness-90" />
    <div class="absolute inset-0 bg-gradient-to-t from-red-950/95 via-black/90 to-black/30 z-10"></div>
    
    <!-- Top HUD Elements -->
    <div class="absolute top-12 left-14 z-50">
        <div class="flex items-center space-x-4 bg-black/60 backdrop-blur-xl px-5 py-2.5 rounded border border-white/10 font-['Manrope'] shadow-2xl">
            <div class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse shadow-[0_0_10px_rgba(239,68,68,0.8)]"></div>
            <span class="text-white/90 text-[15px] font-bold tracking-widest">▶︎ EXOPLAYER</span>
        </div>
    </div>
    <div class="absolute top-12 right-14 z-50">
        <div class="flex items-center space-x-5 glass-light px-6 py-2.5 rounded font-['Manrope']">
            <span class="text-white/70 text-sm tracking-widest font-semibold">BUF 12s &middot; 6.2Mbps &middot; ExoPlayer</span>
            <div class="flex space-x-1.5 items-end h-4">
                <div class="w-1 h-2 bg-white/40"></div>
                <div class="w-1 h-3 bg-white/60"></div>
                <div class="w-1 h-4 bg-white animate-pulse shadow-[0_0_8px_rgba(255,255,255,0.8)]"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="absolute bottom-24 left-20 w-[55%] z-40 font-['Manrope']">
        <p class="text-[13px] text-red-600 tracking-[0.4em] mb-5 uppercase font-bold text-shadow-glow">VENGEANCE LIVES HERE</p>
        <h1 class="font-['Cinzel'] font-bold tracking-[0.2em] text-8xl text-red-600 drop-shadow-[0_10px_30px_rgba(220,38,38,0.8)] leading-[1.1] mb-8">THE BATMAN</h1>
        
        <div class="flex flex-wrap items-center gap-4 mb-8">
            <span class="border border-red-900/50 bg-black/80 px-4 py-1.5 uppercase text-xs tracking-[0.2em] text-red-200 shadow-[inset_0_0_10px_rgba(220,38,38,0.3)]">2022</span><span class="border border-red-900/50 bg-black/80 px-4 py-1.5 uppercase text-xs tracking-[0.2em] text-red-200 shadow-[inset_0_0_10px_rgba(220,38,38,0.3)]">176 MIN</span><span class="border border-red-900/50 bg-black/80 px-4 py-1.5 uppercase text-xs tracking-[0.2em] text-red-200 shadow-[inset_0_0_10px_rgba(220,38,38,0.3)]">PG-13</span><span class="border border-red-900/50 bg-black/80 px-4 py-1.5 uppercase text-xs tracking-[0.2em] text-red-200 shadow-[inset_0_0_10px_rgba(220,38,38,0.3)]">4K HDR10+</span><span class="border border-red-900/50 bg-black/80 px-4 py-1.5 uppercase text-xs tracking-[0.2em] text-red-200 shadow-[inset_0_0_10px_rgba(220,38,38,0.3)]">REMUX · 70GB</span>
        </div>
        
        <p class="text-[22px] text-white/80 leading-relaxed font-light line-clamp-3 max-w-3xl text-shadow">
            When a sadistic serial killer begins murdering key political figures in Gotham, Batman is forced to investigate the city's hidden corruption and question his family's involvement.
        </p>
    </div>
</body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <!-- v2.10.62 — Force a FIXED 1920 px logical viewport on every
             host (HK1, factory Chrome, desktop preview).  Vesper is a
             TV-first app designed against a 1080p (1920×1080) grid;
             cheap HK1 boxes report wildly different "device-width"
             values depending on their DPI / display config (some
             1920, some 1280, some 960), which on the bad boxes makes
             the SAME APK render every element ~1.5–2× too big and
             overflows the right edge — actor avatars push past the
             screen, watch-later thumbs clip off, "Starting Playback"
             overlay sits in the upper-left corner instead of covering
             the whole TV, focus-scroll math fires against the wrong
             page height so D-pad-down stops scrolling, etc.
             Locking the meta to `width=1920` makes the WebView treat
             the logical viewport as 1920 px regardless of physical
             resolution / DPI; WebView's own scaler (with
             `useWideViewPort=true` + `loadWithOverviewMode=true` set
             in MainActivity) then maps the 1920-grid paint onto the
             real display area, so every HK1 box looks identical to
             the "good" 1920 box.  initial-scale=1 keeps the WebView
             from auto-zooming on first load; user-scalable=no blocks
             the rare TV-remote pinch gesture from breaking the lock. -->
        <meta name="viewport" content="width=1920, initial-scale=1, user-scalable=no" />
        <!-- v2.10.58 — Tell the WebView to render in DARK color
             scheme + sRGB color space.  Some Google-TV WebViews
             default to a "preferred-color-scheme: light" mode that
             desaturates the brand blue into a washed-out grey.
             color-scheme: dark forces the browser to use dark
             system theme colors and consistent sRGB rendering. -->
        <meta name="color-scheme" content="dark" />
        <meta name="theme-color" content="#06080F" />
        <meta name="description" content="ON NOW TV V2 — TV-first media client" />
        <link rel="icon" type="image/png" href="/brand/onnowtv-logo.png" />
        <link rel="apple-touch-icon" href="/brand/onnowtv-logo.png" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap" rel="stylesheet" />
        <!--
        manifest.json provides metadata used when your web app is installed on a
        user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
        -->
        <!--
        Notice the use of %PUBLIC_URL% in the tags above.
        It will be replaced with the URL of the `public` folder during the build.
        Only files inside the `public` folder can be referenced from the HTML.

        Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
        work correctly both with client-side routing and a non-root public URL.
        Learn how to configure a non-root public URL by running `npm run build`.
        -->
        <title>ON NOW TV V2</title>
        <style>
            /* Force-hide Emergent preview UI before React boots so
               the badge / static-preview banner can never flash on
               screen — final safety net alongside the build-time
               strip in .github/workflows/build-apk.yml. */
            #emergent-badge,
            [class*="emergent-badge"],
            [id*="emergent-badge"],
            iframe[src*="emergent"],
            a[href*="emergent.sh"],
            a[href*="app.emergent"],
            [id*="static-preview"],
            [class*="static-preview"],
            [class*="staticPreview"],
            [class*="preview-banner"],
            [class*="preview-bar"],
            [class*="resume-preview"],
            [class*="resumePreview"],
            [class*="preview-pod"],
            [class*="hibernate"],
            button[class*="resume"],
            [aria-label*="Resume Preview"],
            [aria-label*="static preview"],
            [data-emergent],
            [data-resume-preview],
            [data-preview-banner] {
                display: none !important;
                visibility: hidden !important;
                opacity: 0 !important;
                pointer-events: none !important;
                position: absolute !important;
                left: -99999px !important;
            }
        </style>
        <script>
            /* v2.6.72: aggressive runtime guard against Emergent's
               preview-hibernation banner.  When the preview pod
               sleeps the platform overlays a "You're viewing a
               static preview — Resume Preview" bar on top of our
               app.  Source HTML is clean (we removed emergent-main.js
               in v2.6.67) but the banner can also be injected by
               server-side middleware on suspended pods.  This
               MutationObserver nukes anything matching known banner
               signatures the instant it appears.
               Real fix is migrating to a production URL (which the
               user is actioning with Emergent support). */
            (function () {
                var SIGS = [
                    /Resume Preview/i,
                    /viewing a static preview/i,
                    /viewing a preview/i,
                ];
                function isBanner(el) {
                    if (!el || !el.textContent) return false;
                    var t = el.textContent.slice(0, 200);
                    for (var i = 0; i < SIGS.length; i++) {
                        if (SIGS[i].test(t)) return true;
                    }
                    return false;
                }
                function kill(node) {
                    try {
                        // Walk up until we find the banner container
                        // (the matching text might be in a deep child).
                        var hop = node;
                        for (var i = 0; i < 6 && hop && hop.parentNode; i++) {
                            if (isBanner(hop) && hop.parentNode !== document.body) {
                                hop = hop.parentNode;
                                continue;
                            }
                            break;
                        }
                        if (hop && hop !== document.body && hop.parentNode) {
                            hop.parentNode.removeChild(hop);
                        }
                    } catch (_e) { /* ignore */ }
                }
                function sweep(root) {
                    if (!root || !root.querySelectorAll) return;
                    try {
                        var all = root.querySelectorAll('div,section,aside,footer,header,nav');
                        for (var i = 0; i < all.length; i++) {
                            if (isBanner(all[i])) kill(all[i]);
                        }
                    } catch (_e) { /* ignore */ }
                }
                document.addEventListener('DOMContentLoaded', function () {
                    sweep(document.body);
                });
                var mo = new MutationObserver(function (mutations) {
                    for (var i = 0; i < mutations.length; i++) {
                        var m = mutations[i];
                        if (m.addedNodes) {
                            for (var j = 0; j < m.addedNodes.length; j++) {
                                var n = m.addedNodes[j];
                                if (n.nodeType !== 1) continue;
                                if (isBanner(n)) { kill(n); continue; }
                                sweep(n);
                            }
                        }
                    }
                });
                mo.observe(document.documentElement, { childList: true, subtree: true });
            })();
        </script>
        <script>window.addEventListener("error",function(e){if(e.error instanceof DOMException&&e.error.name==="DataCloneError"&&e.message&&e.message.includes("PerformanceServerTiming")){e.stopImmediatePropagation();e.preventDefault()}},true);</script>
        <!--
            v2.6.67: removed `<script src="…assets.emergent.sh/scripts/emergent-main.js"></script>`
            from this template entirely.  The user reported the
            sideloaded APK occasionally showing a "redo your preview
            screen" message when the preview pod's WebView idled —
            that banner is injected at runtime by emergent-main.js.
            With the script gone from the source HTML it cannot
            possibly load on the user's TV box.  The .github
            workflow's build-time strip is now a safety net, not the
            primary defence.  (Live in-IDE preview still works fine
            without the script — the iframe just won't get the
            Emergent platform's reload banner / badge.)
        -->
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <!-- v2.10.7 — User requested no in-WebView spinner at
             startup (it makes the app feel "WebView-y").  The
             Android splash screen + the solid #06080F body
             background covers the ~200 ms gap before React mounts;
             zero visible chrome before our own UI renders. -->
        <div id="root"></div>
        <!--
            v2.6.67: removed the "Made with Emergent" badge anchor
            and the posthog telemetry init script from this template.
            Neither was used inside the APK (the build workflow was
            already stripping them at bundle time, but inline-script
            strips are regex-fragile).  This guarantees a clean
            sideloaded experience with zero leftover dev-only UI.
        -->
    </body>
</html>

name: Deploy Launcher Backend to Contabo VPS

# Auto-syncs /app/launcher-backend/ to the Contabo VPS and restarts
# the launcher service whenever the launcher code changes on main.
#
# This deploys the launcher FastAPI server + admin UI (NOT the
# launcher Android APK — that's `build-launcher.yml`).
#
# The workflow auto-detects how the launcher is running on the VPS:
#   1. systemd:  any of onnowtv-launcher{,-backend}.service
#   2. docker:   any container named onnowtv-launcher{,-backend}
#   3. docker-compose: looks for a compose file in the install path
#
# Required GitHub secret: VPS_SSH_PASSWORD  (same one deploy-backend uses)
#
# Optional repo variables (Settings → Secrets and variables → Actions → Variables):
#   VPS_HOST           default 62.84.181.66
#   VPS_USER           default root
#   VPS_LAUNCHER_PATH  default auto-detect (tries /opt/onnowtv/launcher,
#                              /opt/onnowtv-launcher, /srv/onnowtv-launcher)

on:
  push:
    branches: ["**"]
    paths:
      - "launcher-backend/**"
      - ".github/workflows/deploy-launcher.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-launcher
  cancel-in-progress: false

jobs:
  deploy:
    name: Sync launcher → VPS → restart
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install rsync + sshpass
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends rsync sshpass

      - name: Resolve VPS host / user
        id: targets
        run: |
          VPS_HOST="${VPS_HOST_OVERRIDE:-62.84.181.66}"
          VPS_USER="${VPS_USER_OVERRIDE:-root}"
          echo "host=$VPS_HOST" >> "$GITHUB_OUTPUT"
          echo "user=$VPS_USER" >> "$GITHUB_OUTPUT"
        env:
          VPS_HOST_OVERRIDE: ${{ vars.VPS_HOST }}
          VPS_USER_OVERRIDE: ${{ vars.VPS_USER }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ steps.targets.outputs.host }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Auto-detect launcher install path + restart mechanism
        id: detect
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_HOST: ${{ steps.targets.outputs.host }}
          VPS_USER: ${{ steps.targets.outputs.user }}
          VPS_LAUNCHER_PATH_OVERRIDE: ${{ vars.VPS_LAUNCHER_PATH }}
        run: |
          if [ -z "$SSHPASS" ]; then
            echo "::error::VPS_SSH_PASSWORD secret is not set. Add it under Settings → Secrets → Actions."
            exit 1
          fi

          # Returns the first path / service that exists on the VPS.
          # If you've manually set vars.VPS_LAUNCHER_PATH it wins.
          INSTALL_PATH=$(sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "$VPS_USER@$VPS_HOST" "
              if [ -n '$VPS_LAUNCHER_PATH_OVERRIDE' ] && [ -d '$VPS_LAUNCHER_PATH_OVERRIDE' ]; then
                echo '$VPS_LAUNCHER_PATH_OVERRIDE'
                exit 0
              fi
              for p in /opt/onnowtv/launcher /opt/onnowtv-launcher /srv/onnowtv-launcher /opt/launcher-backend; do
                if [ -d \"\$p\" ]; then echo \"\$p\"; exit 0; fi
              done
              echo NOT_FOUND
            ")

          if [ "$INSTALL_PATH" = "NOT_FOUND" ] || [ -z "$INSTALL_PATH" ]; then
            echo "::warning::Could not auto-detect launcher install path on VPS."
            echo "Searched: /opt/onnowtv/launcher, /opt/onnowtv-launcher, /srv/onnowtv-launcher, /opt/launcher-backend"
            echo "Falling back to /opt/onnowtv/launcher (creating it if missing)."
            INSTALL_PATH=/opt/onnowtv/launcher
          fi

          # Detect restart mechanism.
          RESTART_KIND=$(sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "$VPS_USER@$VPS_HOST" "
              # Prefer the most common name first.
              for svc in onnowtv-launcher.service onnowtv-launcher-backend.service launcher-backend.service; do
                if systemctl list-unit-files \"\$svc\" 2>/dev/null | grep -q \"\$svc\"; then
                  echo \"systemd:\$svc\"; exit 0
                fi
              done
              for cname in onnowtv-launcher onnowtv-launcher-backend launcher-backend launcher; do
                if docker ps -a --format '{{.Names}}' 2>/dev/null | grep -qx \"\$cname\"; then
                  echo \"docker:\$cname\"; exit 0
                fi
              done
              if [ -f '$INSTALL_PATH/docker-compose.yml' ] || [ -f '$INSTALL_PATH/compose.yml' ]; then
                echo 'compose'; exit 0
              fi
              echo 'none'
            ")

          echo "install_path=$INSTALL_PATH" >> "$GITHUB_OUTPUT"
          echo "restart_kind=$RESTART_KIND" >> "$GITHUB_OUTPUT"
          echo "Resolved install path: $INSTALL_PATH"
          echo "Restart mechanism:     $RESTART_KIND"

      - name: Rsync launcher code to VPS
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_HOST: ${{ steps.targets.outputs.host }}
          VPS_USER: ${{ steps.targets.outputs.user }}
          VPS_PATH: ${{ steps.detect.outputs.install_path }}
        run: |
          # First make sure the target path exists so rsync doesn't
          # fail on a freshly-provisioned VPS.
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "$VPS_USER@$VPS_HOST" "mkdir -p '$VPS_PATH'"

          # NEVER delete the data/ directory on the VPS — it holds
          # uploaded APKs, wallpapers, the store.json that drives the
          # admin UI, etc.  And NEVER overwrite .env on the VPS.
          #
          # EXCEPTION: data/system-deps/ is code-managed (ships the
          # WebView 138 APKM that Vesper auto-installs).  We include
          # it in rsync so swapping it in-repo actually reaches the
          # VPS — otherwise system-dep updates silently no-op.
          echo "Local files about to be synced (system-deps in particular):"
          ls -lh launcher-backend/data/system-deps/ || echo "  (no system-deps dir in checkout!)"
          echo ""
          echo "rsync --itemize-changes for full visibility:"
          sshpass -e rsync -avz --itemize-changes \
            --exclude="__pycache__" \
            --exclude="*.pyc" \
            --exclude=".env" \
            --exclude=".env.*" \
            --exclude="*.bak*" \
            --exclude="*.log" \
            --exclude=".pytest_cache" \
            --exclude="data/apks/" \
            --exclude="data/apk_icons/" \
            --exclude="data/tile_apks/" \
            --exclude="data/store.json" \
            --exclude="data/store.json.bak" \
            -e "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15" \
            launcher-backend/ "$VPS_USER@$VPS_HOST:$VPS_PATH/"

          echo ""
          echo "Post-sync verification — what's on the VPS NOW:"
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "$VPS_USER@$VPS_HOST" \
            "ls -lh '$VPS_PATH/data/system-deps/' 2>&1; sha256sum '$VPS_PATH/data/system-deps/'*.apkm 2>&1"

      - name: Diagnose where the live launcher reads its DATA_DIR from
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_HOST: ${{ steps.targets.outputs.host }}
          VPS_USER: ${{ steps.targets.outputs.user }}
          VPS_PATH: ${{ steps.detect.outputs.install_path }}
        run: |
          # v2.10.53-g — The rsync target ($VPS_PATH) is detected
          # heuristically (first matching candidate dir), but the
          # RUNNING launcher service may have its DATA_DIR set to
          # a different path via systemd Environment=DATA_DIR=...
          # or via the process's WorkingDirectory.  If those don't
          # match, system-dep swaps (like WebView 138 APKM) silently
          # no-op from the device's perspective because the live
          # service keeps serving the old file from elsewhere.
          #
          # This step:
          #   1. Locates EVERY `data/system-deps` dir on disk.
          #   2. Identifies the running launcher service's actual
          #      DATA_DIR.
          #   3. Mirrors the freshly-rsynced apkm to every found
          #      `data/system-deps` dir (brute-force safety net so
          #      we don't have to guess which one is live).
          #   4. Reloads nginx in case it's caching the response.
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "$VPS_USER@$VPS_HOST" "VPS_PATH='$VPS_PATH' bash -s" << 'EOF'
            set -uo pipefail

            echo '── 1. systemd service inspection ──'
            for svc in onnowtv-launcher onnow-launcher launcher-backend onnowtv onnow; do
              if systemctl list-unit-files 2>/dev/null | grep -q "^${svc}\.service"; then
                echo "── ${svc}.service ──"
                systemctl show "${svc}.service" -p WorkingDirectory -p ExecStart -p Environment -p MainPID 2>/dev/null
                echo ""
              fi
            done

            echo '── 2. /proc inspection of any python proc running main.py ──'
            for pid in $(pgrep -af "python.*main\\.py|uvicorn.*main:app" 2>/dev/null | awk '{print $1}'); do
              echo "PID $pid:"
              echo "  cwd:    $(readlink /proc/$pid/cwd 2>/dev/null)"
              echo "  exe:    $(readlink /proc/$pid/exe 2>/dev/null)"
              echo "  cmdline: $(tr '\\0' ' ' < /proc/$pid/cmdline 2>/dev/null)"
              echo "  DATA_DIR env: $(tr '\\0' '\\n' < /proc/$pid/environ 2>/dev/null | grep -E '^DATA_DIR=' | head -1)"
              echo "  ALL non-secret env vars:"
              tr '\\0' '\\n' < /proc/$pid/environ 2>/dev/null | grep -vE 'KEY|TOKEN|PASSWORD|SECRET' | sed 's/^/    /'
              echo ""
            done

            echo '── 2b. .env file content on VPS (redacting secrets) ──'
            for envfile in /opt/onnowtv-launcher/.env /opt/onnowtv/launcher/.env /etc/onnowtv-launcher.env; do
              if [ -f "$envfile" ]; then
                echo "── $envfile ──"
                grep -vE "KEY|TOKEN|PASSWORD|SECRET" "$envfile" | sed 's/^/  /'
                echo "  (lines with secrets above were redacted)"
                echo ""
              fi
            done

            echo '── 3. ALL system-deps dirs on disk + their webview-138.apkm SHA ──'
            mapfile -t DIRS < <(find /opt /srv /var/lib /var/www /var/cache /home /etc/nginx -maxdepth 6 -type d -name 'system-deps' 2>/dev/null)
            for d in "${DIRS[@]}"; do
              echo "── $d ──"
              ls -lh "$d" 2>&1 | head -20
              [ -f "$d/webview-138.apkm" ] && sha256sum "$d/webview-138.apkm"
              [ -f "$d/webview-138.apk"  ] && sha256sum "$d/webview-138.apk"
              echo ""
            done

            echo '── 3b. Any webview-138.apkm/apk file ANYWHERE on disk ──'
            find / -name 'webview-138.apk*' -type f 2>/dev/null | while read f; do
              echo "  $(ls -lh "$f")"
              sha256sum "$f"
            done

            echo '── 3c. Nginx config — anything matching system-deps or alias/root ──'
            if command -v nginx >/dev/null 2>&1; then
              echo "Nginx full config dump (grep'd for system-deps and proxy_cache):"
              nginx -T 2>/dev/null | grep -B 2 -A 4 -iE "system-deps|proxy_cache|alias|root\s+/|location.*launcher" | head -80
              echo ""
              echo "Nginx cache directories:"
              find /var/cache/nginx /var/lib/nginx -maxdepth 4 -type d 2>/dev/null | head -10
            fi

            echo '── 3e. Find EVERY store.json on the host (= every plausible data dir) ──'
            find / -name 'store.json' -type f 2>/dev/null | while read sf; do
              dir=$(dirname "$sf")
              apk_count=$(find "$dir/apks" -maxdepth 1 -type f 2>/dev/null | wc -l)
              size=$(stat -c '%s' "$sf" 2>/dev/null)
              mtime=$(stat -c '%y' "$sf" 2>/dev/null)
              echo "  $sf"
              echo "    size=${size}b, mtime=$mtime, apks_in_sibling_apks_dir=$apk_count"
            done

            echo '── 3f. Current .env contents (DATA_DIR line only, no secrets) ──'
            ENVFILE="$VPS_PATH/.env"
            if [ -f "$ENVFILE" ]; then
              grep -E '^DATA_DIR=' "$ENVFILE" || echo "  (no DATA_DIR line in .env — using default)"
            fi

            echo '── 4b. Auto-detect the REAL production data directory ──'
            # v2.10.53-h URGENT FIX — previous version of this step
            # blindly forced DATA_DIR=$VPS_PATH/data which hid the
            # admin's full App Store from the launcher service when
            # the production data lived under a different path
            # (e.g. /opt/onnowtv/launcher/data or /srv/...).
            #
            # New algorithm: scan every plausible launcher data dir
            # on the host, pick the one with the MOST apks in it —
            # that's the live production data — and point DATA_DIR
            # there.  If $VPS_PATH/data wins (because the operator
            # never had a separate data dir), that's also fine.
            BEST_DATA=""
            BEST_COUNT=0
            for cand in \
                /app/launcher-backend/data \
                /opt/onnowtv-launcher/data \
                /opt/onnowtv/launcher/data \
                /opt/onnowtv/data \
                /srv/onnowtv-launcher/data \
                /srv/onnowtv/launcher/data \
                /opt/launcher-backend/data \
                /var/lib/onnowtv-launcher/data \
                /var/lib/onnowtv-launcher \
                "$VPS_PATH/data"; do
              if [ -d "$cand/apks" ]; then
                c=$(find "$cand/apks" -maxdepth 1 -type f \( -name '*.apk' -o -name '*.apkm' \) 2>/dev/null | wc -l)
                store_size=$(stat -c '%s' "$cand/store.json" 2>/dev/null || echo 0)
                echo "  $cand → $c apks, store.json=${store_size}b"
                # Score = apk_count * 10 + store_size_kb — prefer
                # dirs that have BOTH apks and a real store.json.
                score=$((c * 10 + store_size / 1024))
                if [ "$score" -gt "$BEST_COUNT" ]; then
                  BEST_COUNT=$score
                  BEST_DATA=$cand
                fi
              fi
            done
            echo ""
            echo "  Winner: $BEST_DATA (score=$BEST_COUNT)"

            ENVFILE="$VPS_PATH/.env"
            if [ -n "$BEST_DATA" ] && [ -f "$ENVFILE" ]; then
              CURRENT=$(grep -E '^DATA_DIR=' "$ENVFILE" | tail -1 | cut -d= -f2-)
              echo "  Current DATA_DIR in .env: '${CURRENT:-<unset>}'"
              echo "  Setting to:               '$BEST_DATA'"
              # SAFETY: snapshot the .env before mutating it so we
              # can roll back manually if this still picks the wrong
              # dir.  Keep up to 5 generations.
              cp -p "$ENVFILE" "$ENVFILE.bak.$(date +%s)" 2>/dev/null || true
              ls -t "$ENVFILE.bak."* 2>/dev/null | tail -n +6 | xargs -r rm -f
              sed -i '/^DATA_DIR=/d' "$ENVFILE"
              echo "DATA_DIR=$BEST_DATA" >> "$ENVFILE"

              # v2.10.54 — also align PUBLIC_BASE_URL with the
              # Cloudflare-fronted production host.  The backend
              # uses this to build absolute apk_url / icon_url /
              # wallpaper_url returns, so clients on the new
              # launcher (which uses onnowhub.com) get URLs that
              # match the host they're already talking to (avoids
              # an unnecessary cross-host hop on every asset).
              CUR_PUB=$(grep -E '^PUBLIC_BASE_URL=' "$ENVFILE" | tail -1 | cut -d= -f2-)
              EXPECTED_PUB="https://onnowhub.com/launcher"
              echo "  Current PUBLIC_BASE_URL:  '${CUR_PUB:-<unset>}'"
              echo "  Setting to:               '$EXPECTED_PUB'"
              sed -i '/^PUBLIC_BASE_URL=/d' "$ENVFILE"
              echo "PUBLIC_BASE_URL=$EXPECTED_PUB" >> "$ENVFILE"

              NEEDS_RESTART=1
            fi

            echo '── 4c. Mirror new apkm into the WINNER data dir (so Path 1 hits) ──'
            # The rsync wrote to $VPS_PATH/data/system-deps/.  If
            # the winner is a DIFFERENT data dir, the new apkm must
            # also live in that dir's system-deps/ subfolder.
            SRC="$VPS_PATH/data/system-deps/webview-138.apkm"
            if [ -n "$BEST_DATA" ] && [ -f "$SRC" ] && [ "$BEST_DATA" != "$VPS_PATH/data" ]; then
              mkdir -p "$BEST_DATA/system-deps"
              echo "  Copying $SRC → $BEST_DATA/system-deps/webview-138.apkm"
              cp -f "$SRC" "$BEST_DATA/system-deps/webview-138.apkm"
              # Remove any stale .apk fallback that would shadow the .apkm
              [ -f "$BEST_DATA/system-deps/webview-138.apk" ] && rm -f "$BEST_DATA/system-deps/webview-138.apk" && echo "  (removed stale .apk fallback in winner)"
            else
              echo "  (winner is the rsync target — no extra copy needed)"
            fi

            echo '── 5. Reload nginx + purge any cached responses to drop old served file ──'
            # Purge proxy_cache if any
            if [ -d /var/cache/nginx ]; then
              find /var/cache/nginx -type f -name '*' 2>/dev/null | xargs rm -f 2>/dev/null || true
              echo "  cleared /var/cache/nginx contents"
            fi
            nginx -s reload 2>/dev/null && echo "  nginx reloaded" || echo "  (nginx reload skipped — not present or no perms)"
            systemctl reload nginx 2>/dev/null && echo "  systemctl reloaded nginx" || true
            # Also restart the launcher service so it re-opens any cached file handles
            systemctl restart onnowtv-launcher 2>/dev/null && echo "  onnowtv-launcher.service restarted" || true

            echo '── 6. Final verification — what every system-deps dir holds now ──'
            for d in "${DIRS[@]}"; do
              echo "$d:"
              [ -f "$d/webview-138.apkm" ] && sha256sum "$d/webview-138.apkm"
              [ -f "$d/webview-138.apk"  ] && sha256sum "$d/webview-138.apk"
            done

            echo '── 7. Ensure nginx accepts onnowhub.com (Cloudflare migration) ──'
            # v2.10.54 — Make sure nginx server_name includes both
            # the new Cloudflare-fronted host and the legacy DuckDNS
            # one.  Cloudflare proxies inbound HTTPS to origin :443,
            # so the VPS must answer for "Host: onnowhub.com" even
            # though no Let's Encrypt cert exists for that name yet
            # (Cloudflare's Full SSL mode is permissive about origin
            # cert hostname mismatch).
            CONF=$(find /etc/nginx/sites-enabled /etc/nginx/conf.d -type f -name '*onnow*' 2>/dev/null | head -1)
            if [ -z "$CONF" ]; then
              CONF=$(find /etc/nginx -type f \( -name '*.conf' -o -name 'default' \) -exec grep -l 'onnowtv.duckdns.org' {} \; 2>/dev/null | head -1)
            fi
            if [ -n "$CONF" ] && [ -f "$CONF" ]; then
              echo "  nginx vhost file: $CONF"
              if grep -qE '^\s*server_name\b.*onnowhub\.com' "$CONF"; then
                echo "  (server_name already lists onnowhub.com, no change)"
              else
                cp -p "$CONF" "$CONF.bak.$(date +%s)"
                # Append onnowhub.com to every server_name line that
                # mentions onnowtv.duckdns.org.
                sed -i -E '/^[[:space:]]*server_name[[:space:]]/{ /onnowhub\.com/!s/(onnowtv\.duckdns\.org)/\1 onnowhub.com www.onnowhub.com/g; }' "$CONF"
                echo "  Updated server_name to include onnowhub.com:"
                grep -E '^\s*server_name' "$CONF" | sed 's/^/    /'
                # Validate the resulting config before reload.
                if nginx -t 2>&1; then
                  systemctl reload nginx 2>/dev/null || nginx -s reload 2>/dev/null
                  echo "  nginx config valid + reloaded"
                else
                  echo "  ⚠️  nginx -t failed, rolled back to backup"
                  cp -p "$CONF.bak."* "$CONF" 2>/dev/null
                fi
              fi
            else
              echo "  (could not locate the launcher nginx vhost file — manual setup may be needed)"
            fi

            echo '── 8. Ensure nginx forwards WebSocket Upgrade headers under /launcher/ ──'
            # v2.10.87 — The Remote Support feature is the FIRST and
            # only WebSocket endpoint on the launcher backend.  Most
            # nginx vhost configs proxy `/launcher/` without
            # `proxy_set_header Upgrade` + `Connection upgrade` +
            # `proxy_http_version 1.1`, which silently kills the WS
            # handshake — the browser sees an immediate 1006 close.
            # Patch the location block in place so the handshake
            # works without manual VPS surgery.
            if [ -n "$CONF" ] && [ -f "$CONF" ]; then
              if grep -qE 'proxy_set_header[[:space:]]+Upgrade' "$CONF"; then
                echo "  (Upgrade header already forwarded — no change)"
              else
                cp -p "$CONF" "$CONF.bak.ws.$(date +%s)"
                # Inject the three required directives + a sensible
                # WS idle timeout into every `location` block that
                # already does proxy_pass to 127.0.0.1:8002 (i.e. the
                # launcher backend).  Idempotent: the grep above
                # guards against double-injection.
                python3 - "$CONF" << 'PYEOF'
import re, sys, pathlib
p = pathlib.Path(sys.argv[1])
text = p.read_text()
new_directives = (
    "        proxy_http_version 1.1;\n"
    "        proxy_set_header Upgrade $http_upgrade;\n"
    "        proxy_set_header Connection \"upgrade\";\n"
    "        proxy_read_timeout 3600s;\n"
    "        proxy_send_timeout 3600s;\n"
)
# Find location blocks whose body contains proxy_pass to :8002 and
# inject the WS directives right before that proxy_pass line.
pattern = re.compile(
    r'(location\b[^{]*\{[^}]*?)(\s*proxy_pass\s+http://(?:127\.0\.0\.1|localhost):8002[^;]*;)',
    flags=re.DOTALL,
)
def repl(m):
    head, pp = m.group(1), m.group(2)
    if "proxy_set_header Upgrade" in head:
        return m.group(0)
    return head + "\n" + new_directives + pp
new_text, n = pattern.subn(repl, text)
if n > 0 and new_text != text:
    p.write_text(new_text)
    print(f"  patched {n} location block(s) in {p}")
else:
    print(f"  no location block matched in {p} — manual review may be needed")
PYEOF
                if nginx -t 2>&1; then
                  systemctl reload nginx 2>/dev/null || nginx -s reload 2>/dev/null
                  echo "  WS-upgrade patch applied, nginx reloaded"
                else
                  echo "  ⚠️  nginx -t failed after WS patch, rolling back"
                  cp -p "$CONF.bak.ws."* "$CONF" 2>/dev/null
                fi
              fi
            fi

            # Always exit 0 — diagnostic step must not fail the deploy
            exit 0
          EOF


      - name: Install new Python dependencies (idempotent)
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_HOST: ${{ steps.targets.outputs.host }}
          VPS_USER: ${{ steps.targets.outputs.user }}
          VPS_PATH: ${{ steps.detect.outputs.install_path }}
        run: |
          # Pick the first venv that exists.  /opt/onnowtv/venv is
          # shared with the main backend; fall back to a launcher-
          # local venv if the operator created one.
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "$VPS_USER@$VPS_HOST" "
              set -e
              VENV=''
              for cand in /opt/onnowtv/launcher-venv /opt/onnowtv-launcher/venv $VPS_PATH/venv /opt/onnowtv/venv; do
                if [ -x \"\$cand/bin/pip\" ]; then VENV=\"\$cand\"; break; fi
              done
              if [ -z \"\$VENV\" ]; then
                echo 'ℹ No Python venv detected — skipping pip install (probably running under Docker).'
              elif [ -f \"$VPS_PATH/requirements.txt\" ]; then
                \"\$VENV/bin/pip\" install --quiet --disable-pip-version-check -r \"$VPS_PATH/requirements.txt\"
              fi
            "

      - name: Restart launcher service
        env:
          SSHPASS: ${{ secrets.VPS_SSH_PASSWORD }}
          VPS_HOST: ${{ steps.targets.outputs.host }}
          VPS_USER: ${{ steps.targets.outputs.user }}
          VPS_PATH: ${{ steps.detect.outputs.install_path }}
          RESTART_KIND: ${{ steps.detect.outputs.restart_kind }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            "$VPS_USER@$VPS_HOST" "
              set -e
              case '$RESTART_KIND' in
                systemd:*)
                  svc='${RESTART_KIND#systemd:}'
                  echo '🔄 Restarting systemd unit:' \"\$svc\"
                  systemctl restart \"\$svc\"
                  sleep 4
                  if ! systemctl is-active --quiet \"\$svc\"; then
                    echo '❌ Service failed to start. Recent logs:'
                    journalctl -u \"\$svc\" --no-pager -n 30
                    exit 1
                  fi
                  ;;
                docker:*)
                  cname='${RESTART_KIND#docker:}'
                  echo '🔄 Restarting docker container:' \"\$cname\"
                  docker restart \"\$cname\"
                  sleep 4
                  if ! docker ps --format '{{.Names}}' | grep -qx \"\$cname\"; then
                    echo '❌ Container failed to come back up. Recent logs:'
                    docker logs --tail 30 \"\$cname\" 2>&1 || true
                    exit 1
                  fi
                  ;;
                compose)
                  echo '🔄 docker compose restart in' '$VPS_PATH'
                  cd '$VPS_PATH'
                  docker compose restart || docker-compose restart
                  ;;
                none|*)
                  echo '::warning::No known restart mechanism detected.'
                  echo 'The code has been rsynced but the running process was NOT restarted.'
                  echo 'Manually restart the launcher backend on the VPS, or set the'
                  echo 'systemd/docker name so this workflow can auto-restart in future.'
                  ;;
              esac
              echo '✅ Restart sequence finished.'
            "

      - name: Smoke-test the launcher admin page
        run: |
          # Try the most common URLs people host the launcher under.
          # Any 200 OR 401 (auth still on) is a green light — the
          # process is up.  Only fail when nothing responds.
          # v2.10.58 — Probe Cloudflare first, fall back to DuckDNS so
          # we still catch problems even if the new domain has a hiccup.
          for host in onnowhub.com onnowtv.duckdns.org; do
            for path in /launcher/api/admin/store /launcher/admin/ /api/admin/store /admin/; do
              for proto in https http; do
                url="$proto://$host$path"
                code=$(curl -sk -o /dev/null -w "%{http_code}" --max-time 10 "$url" || echo 000)
                echo "$url → HTTP $code"
                if [ "$code" = "200" ] || [ "$code" = "401" ]; then
                  echo "✅ Launcher responding at $url"
                  exit 0
                fi
              done
            done
          done
          echo "::warning::Could not confirm the launcher is responding over HTTPS."
          echo "The rsync + restart succeeded; you may just need to hit a different URL."

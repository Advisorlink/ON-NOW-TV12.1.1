name: Build ON NOW V2 Live TV APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & sign Live TV APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Derive versionCode + versionName
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VC=$(( 1 + $(git rev-list --count HEAD -- android/onnowtv-livetv/ || echo 0) ))
          VN=$(grep -m1 -E '^## v[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md 2>/dev/null | sed -E 's/^## v([0-9]+\.[0-9]+\.[0-9]+).*/\1/' || true)
          [ -z "$VN" ] && VN="1.0.0"
          echo "VC=$VC" >> $GITHUB_OUTPUT
          echo "VN=$VN" >> $GITHUB_OUTPUT
          echo "versionCode=$VC versionName=$VN"

      - name: Set up keystore (reuse launcher's dev signing chain)
        env:
          KEYSTORE_BASE64: ${{ secrets.LAUNCHER_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.LAUNCHER_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.LAUNCHER_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.LAUNCHER_KEY_PASSWORD }}
        shell: bash
        run: |
          ANDROID_KS_DIR="${RUNNER_TEMP}/ks"
          mkdir -p "$ANDROID_KS_DIR"
          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$ANDROID_KS_DIR/release.jks"
            echo "RELEASE_STORE_FILE=$ANDROID_KS_DIR/release.jks"      >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD"           >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS"                        >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD"                  >> $GITHUB_ENV
          else
            echo "No release keystore — debug APK will still build."
          fi

      - name: Bootstrap gradle wrapper
        working-directory: android/onnowtv-livetv
        run: |
          set -euo pipefail
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7 || true
          fi
          chmod +x ./gradlew || true

      - name: Build debug + release APKs
        working-directory: android/onnowtv-livetv
        env:
          VERSION_CODE: ${{ steps.version.outputs.VC }}
          VERSION_NAME: ${{ steps.version.outputs.VN }}
        run: |
          set -euo pipefail
          ./gradlew :app:assembleDebug :app:assembleRelease \
            -PversionCode=$VERSION_CODE \
            -PversionName=$VERSION_NAME \
            --no-daemon \
            --warning-mode summary

      - name: Locate + rename APKs
        shell: bash
        run: |
          set -euo pipefail
          echo "=== all APKs produced ==="
          find android/onnowtv-livetv/app/build/outputs/apk -name "*.apk" -type f -ls || true

          DBG=$(find android/onnowtv-livetv/app/build/outputs/apk -name "*-debug.apk" -type f | head -n1)
          if [ -z "$DBG" ]; then
            echo "::error::No debug APK produced"
            exit 1
          fi
          cp "$DBG" "$GITHUB_WORKSPACE/onnowtv-livetv-debug.apk"

          REL=$(find android/onnowtv-livetv/app/build/outputs/apk -name "*-release.apk" -type f | head -n1)
          if [ -z "$REL" ]; then
            REL=$(find android/onnowtv-livetv/app/build/outputs/apk -name "*-release-unsigned.apk" -type f | head -n1)
          fi
          if [ -n "$REL" ]; then
            cp "$REL" "$GITHUB_WORKSPACE/onnowtv-livetv-release.apk"
          fi

      - name: Publish to GitHub Releases (livetv-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: livetv-latest
          name: "ON NOW V2 Live TV ${{ steps.version.outputs.VN }} (build ${{ steps.version.outputs.VC }})"
          body: |
            **ON NOW V2 Live TV — native Android TV IPTV guide.**

            What's inside:
              • Native Kotlin app — EPG rendered entirely in RecyclerView so
                D-pad nav uses Android's proven focus engine.
              • 14 000+ channels from the managed Xtream provider, with the
                next 3 days of EPG pre-warmed on the backend and delivered in
                a single gzipped bundle for instant load.
              • ExoPlayer (media3) for low-latency HLS / TS playback.
              • Same dark Vesper navy palette + red "V2 Live TV" wordmark as
                the rest of the suite.

            Credentials are stored server-side in the backend's `.env` — the
            APK ships with zero secrets baked in.

            Install:
            1. Download `onnowtv-livetv-release.apk` (or `-debug.apk`) below.
            2. Sideload via `adb install` or a file-explorer app.
            3. Launch — bundle loads from `onnowtv.duckdns.org`.
          files: |
            onnowtv-livetv-debug.apk
            onnowtv-livetv-release.apk
          fail_on_unmatched_files: false
          prerelease: true
          make_latest: 'false'

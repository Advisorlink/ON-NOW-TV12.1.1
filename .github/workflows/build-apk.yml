              & episodes still get the 1.2 s synopsis read.
            - 🔇 **Fix for audio-only video bug.**  Live TS streams
              were sometimes carrying a teletext subtitle track that
              fought the video decoder for a thread on the HK1's
              modest CPU.  Now `:no-sub-autodetect-file` +
              `:sub-track=-1` for live, so subs never compete with
              video on the first-frame race.  Also `:avcodec-fast`
              + `:avcodec-threads=0` (use all cores) +
              `:avcodec-skiploopfilter=1` for lighter HEVC decoding.
            - 🎯 **"Press OK for menu" pulsing host hint** added on

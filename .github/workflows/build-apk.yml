            **v2.6.11 — "Add to My List" OK button works again**
            - 🐛 FIXED: long-pressing OK on a poster opened the
              "Add to My List" modal correctly, but pressing OK on
              the modal's confirm button did nothing.  Root cause:
              the capture-phase keyup guard was eating EVERY
              Enter/Space release while the modal was open, not
              just the first one (the long-press tail).  So the
              user's confirm press never reached the button.
            - ✅ Now eats only the FIRST keyup (the long-press
              tail), then arms the modal.  All subsequent presses
              flow through to the focused button as expected.
            - 🎨 Home rows: NO visual changes from v2.6.10.  The
              perfect row layout you confirmed is preserved

              tried to center a row, the browser had no scroll-room
              at the top/bottom of the viewport, so rows stuck to
              the edges where the focus scale clipped against the
              shelves-region's `overflow-y: auto` boundary.
            - ✅ Added 60 px paddingTop AND paddingBottom to the
              shelves-region (plus matching scroll-padding).  The
              shelves-region's content is now taller than its
              viewport, so `block: 'center'` always has scroll-room
              to actually center.  Focus scale never reaches an
              overflow boundary.

            **v2.6.15 — THE actual bottom-clipping fix (paint containment)**
            - 🎯 ROOT CAUSE finally found.  CSS `contain: paint` on
              `.vesper-shelf` and `.vesper-shelf-section` was acting
              like an invisible `overflow: hidden` on every shelf
              row — clipping the bottom ~10 px of any focused tile's
              scale(1.08) animation, regardless of where the row was
              positioned in the viewport.  No amount of row-pinning
              could ever fix it because the clip happened at paint
              time inside each row.
            - ✅ Removed `paint` from the contain list (kept `layout`
              + `style` — those provide the perf win without
              clipping).  Focused poster bottoms now render fully
              regardless of which row they're in or where they sit
              on screen.


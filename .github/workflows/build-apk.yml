name: Build ON NOW TV V2 APK

# Builds an installable Android APK for the HK1 box.  Drops the
# signed-debug APK as a workflow artifact AND attaches it to a
# GitHub Release tagged "apk-latest".

on:
  push:
    branches: [main, master]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Generate gradle wrapper
        working-directory: android/vesper-tv
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew
          ls -la gradlew gradle/wrapper/

      - name: Build debug APK
        working-directory: android/vesper-tv
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        id: locate
        run: |
          APK=$(find android/vesper-tv/app/build/outputs/apk -name "*.apk" | head -n1)
          echo "Found APK: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/onnowtv-v2-debug.apk"
          ls -la "$GITHUB_WORKSPACE/onnowtv-v2-debug.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnowtv-v2-debug.apk
          path: onnowtv-v2-debug.apk
          retention-days: 30

      - name: Publish/update "apk-latest" Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: ON NOW TV V2 — latest debug build
          body: |
            Sideload-ready debug APK auto-built from the latest commit.
            Install on your HK1 box via "Downloader" by AFTVnews — paste
            this release page's APK download URL.
          files: onnowtv-v2-debug.apk
          prerelease: true
          make_latest: 'false'

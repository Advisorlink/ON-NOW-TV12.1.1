            **v2.6.66 — Watch Together: sub-second sync · Onboarding slide refined**
            - 🎯 **Watch-Together host/guest now sub-second in sync.**
              Previously the drift tolerance was 1500 ms so a 1 s
              host-ahead-of-guest lag would never trigger a
              correction.  Two changes:
              • Host heartbeat cadence 1000 ms → **500 ms** so
                guests get fresher host position twice per second.
              • Guest drift threshold 1500 ms → **350 ms** so any
                lag over ~⅓ s now triggers an automatic seek to
                catch up.  Combined effect: any startup-latency
                drift is corrected within ~500 ms of the host's
                next heartbeat — host and guest end up within a
                couple frames of each other.
            - 🎮 **No-mouse onboarding slide refined.**
              • Removed the secondary mouse icon — the slide now
                shows just your remote, integrated cleanly into
                the dark panel (no more "sticker on white card").
              • Pre-processed the remote PNG to make near-white
                pixels transparent + cropped to the remote's
                bounding box.
              • Updated copy: "**No more pesky air mouse**" with a
                small red ✕ over the air-mouse button (the gyro
                pointer toggle at the top of the remote), cyan OK
                glow ring + label "← OK · THIS IS ALL YOU NEED".
              • Hidden the duplicate floating-D-pad reminder for
                this scene only — the user's actual remote is the
                hint.
            - 🆙 APK bumped to **v2.6.66** (versionCode 136).

            **v2.6.65 — Trailer plays in HD · No-mouse onboarding · Focus trap · Update gate fix**
            - 🎬 **Trailers FINALLY play in HD!** The YouTube iframe
              approach was hitting walls on Android WebView (couldn't
              get past 360p, occasionally just blank).  We now extract
              the trailer's 1080p video-only + matching m4a audio
              streams server-side via yt-dlp, then play them in the
              **native libVLC player** with audio as an input-slave.
              Result: HD, smooth, hardware-decoded, no Android intent
              redirect to the YouTube app, no chunky 360p.
            - 🔒 **Long-press save dialog now traps focus** — pressing
              LEFT/RIGHT bounces between Confirm/Cancel; UP/DOWN does
              nothing.  If focus somehow drifts to a tile behind the
              modal, we rubber-band it back to the confirm button.
              You can never accidentally fall through to the
              background again.
            - 🔄 **Update gate now triggers on every app launch** —
              previously a 6 h client cache short-circuited the
              version check so re-opening the app within 6 h after a
              release wouldn't show the gate.  Now we ALWAYS fetch
              the latest version on mount AND on visibilitychange
              (Android Activity resume), so closing/reopening the
              app picks up new releases immediately.
            - 🎮 **New onboarding slide: "No more need for that pesky
              mouse"** — features your actual remote photo with an
              animated OK glow ring, next to a mouse icon with a big
              red ✕ through it.  Surfaces upfront that the entire app
              is built around the D-pad.

            **v2.6.64 — Watch Together: host & guest now watch the SAME file**
            - 🔧 **THE root cause of "stuck spinning":** host & guest
              each ran their OWN stream resolution → could pick
              different URLs (Plex direct on one side, slow torrent
              on the other).  If either member's stream couldn't
              buffer, the server hung in `loading` waiting for a
              `ready` that never came — and BOTH members spun
              forever.
            - 🤝 **New contract**: host's Detail page now broadcasts
              its chosen stream URL via the party WS (`stream`
              message).  Guest's Detail page sits on the joining
              screen waiting for that URL — no independent stream
              picking, no desync, no hangs.
            - 🛡️ **Server-side loading watchdog (25 s)** — if not
              every member reports `ready` within 25 s, the
              server force-advances to `countdown` anyway.  Slow
              members catch up via the regular drift-correction.
              The party is no longer hostage to one bad stream.
            - 🛡️ **Native player force-ready (20 s)** — if libVLC
              still hasn't reached `Playing` after 20 s of party
              prep, we send `ready` anyway so the other party
              members aren't held up by our slow stream.
            - 🩹 **Picker flash fixed** — the joining screen now
              stays mounted all the way through to navigation.
              Previously `setAutoplayFired(true)` unmounted the
              joining screen 30 ms before navigate() actually fired,
              exposing the picker for one frame.
            - 😱 **Emoji reactions in the native player** — hold
              D-pad UP for 2 s for ❤️, DOWN for 😱, LEFT for 😂,
              RIGHT for 😭.  Renders floating bubble locally AND
              broadcasts to every other party member.
            - 🚨 **`stream_error` broadcast** — if the host can't
              find any streams, the guest sees a clean error
              message instead of spinning indefinitely.

            **v2.6.63 — Production stability: no more uninstall-reinstall**
            - 🛡️ **Top-level ErrorBoundary upgraded**:  Reset &
              Reload now ALSO clears `onnowtv-*` / `vesper-*` /
              `vesper:*` localStorage keys (it previously only
              touched ephemeral caches).  This is the in-app
              equivalent of "Clear app data" — users never need
              to uninstall the APK to recover from a corrupted
              state.
            - 🚨 ErrorBoundary now ESCALATES top-level boot errors
              (chunk load failure, ParseError, "Cannot read
              property", quota exceeded) into the recovery UI
              instead of silently logging them.  If anything
              throws in the boot path, users see the friendly
              Reset & Reload card — never a black screen.
            - 🪖 **Defensive parsers** in 3 critical store
              modules:
              • `listProfiles()` now tolerates the profile blob
                being `null` / an object / a non-array — coerces
                to `[]` instead of throwing.
              • `library.read()` rejects non-object JSON.parse
                results and per-field type-checks favorites /
                actors / dismissed.
              • `BootSplash` ignores non-object bundle meta and
                relies on the min-elapsed timer as a backstop.
            - 🎯 Bottom line: a single bad localStorage blob can
              no longer brick the app.  Worst case is the user
              taps **Reset & Reload** and lands back on the
              profile picker.


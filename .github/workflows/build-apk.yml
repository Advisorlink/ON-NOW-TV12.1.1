            **v2.6.29 — Instant Live TV: server-side pre-warmed bundle**
            - ⚡ INSTANT Live TV guide.  On app boot the client now
              fetches a single gzipped bundle from
              `/api/xtream/instant-bundle` containing:
                • all categories
                • all channels (with pre-built stream URLs)

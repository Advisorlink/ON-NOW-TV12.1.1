              (top edge of row aligns to top of shelves region) to
              `block: 'center'` (row anchors at vertical center).
              Result: every row still lands at the same consistent
              Y position (RecyclerView feel), but the focus scale
              animation now has equal headroom above AND below
              instead of all the buffer being above.


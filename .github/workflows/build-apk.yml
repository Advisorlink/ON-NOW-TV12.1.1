name: Build ON NOW TV V2 APK

# Workflow:
#   1. Build the React app with the live REACT_APP_BACKEND_URL baked in
#      (so the bundled APK still talks to the deployed backend for
#      TMDB / Stremio addons).
#   2. Copy the build output into android/vesper-tv/app/src/main/assets/web/
#      so the WebView loads it from file:///android_asset/.
#   3. Build the debug APK.  Publish artifact + auto-update Release.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release

env:
  # Live deployed backend URL — the APK bakes this into the
  # production JS bundle, so the sideloaded app keeps fetching real
  # TMDB and addon data without any preview-URL dependency on the
  # frontend side.
  REACT_APP_BACKEND_URL: https://rebrand-app-5.preview.emergentagent.com

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn deps
        working-directory: frontend
        run: yarn install --network-timeout 600000

      - name: Build React app (production)
        working-directory: frontend
        env:
          CI: 'false'  # don't fail the build on lint warnings
          GENERATE_SOURCEMAP: 'false'
          DISABLE_ESLINT_PLUGIN: 'true'
        run: |
          yarn build
          echo "=== React build output: ==="
          ls -la build/
          echo "=== JS bundle: ==="
          ls -la build/static/js/ 2>/dev/null | head -5

      - name: Bundle frontend into Android assets
        run: |
          rm -rf android/vesper-tv/app/src/main/assets/web
          mkdir -p android/vesper-tv/app/src/main/assets/web
          cp -r frontend/build/. android/vesper-tv/app/src/main/assets/web/

          # --- Strip Emergent preview / PostHog telemetry from the
          # bundled index.html.  These scripts inject the "You're
          # viewing a static preview — Resume to interact" banner and
          # the "Made with Emergent" badge, both of which show up on
          # the sideloaded APK because the WebView fetches them over
          # the internet.  We want a clean, branded experience inside
          # the box, so we surgically remove them at bundle time.
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('android/vesper-tv/app/src/main/assets/web/index.html')
          html = p.read_text(encoding='utf-8')
          # 1) Remove the emergent-main.js loader script.
          html = re.sub(
              r'<script[^>]*assets\.emergent\.sh[^>]*></script>\s*',
              '', html, flags=re.IGNORECASE)
          # 2) Remove the "Made with Emergent" badge anchor element.
          html = re.sub(
              r'<a\s+id="emergent-badge"[\s\S]*?</a>\s*',
              '', html, flags=re.IGNORECASE)
          # 3) Remove the PostHog telemetry init script block.
          html = re.sub(
              r'<script>\s*!\(function\s*\([^)]*\)\s*\{[\s\S]*?posthog\.init\([\s\S]*?\}\);?\s*</script>\s*',
              '', html, flags=re.IGNORECASE)
          p.write_text(html, encoding='utf-8')
          print('=== index.html cleaned of Emergent / PostHog tracking ===')
          PY

          # --- Wrap each main JS chunk in try/catch so any runtime
          # failure on the box becomes a readable error string in the
          # boot splash diagnostic panel — instead of a CORS-masked
          # "Script error." with no message (the default behaviour
          # for any file:// loaded script on Android WebView).
          python3 - <<'PY'
          import pathlib, re
          js_dir = pathlib.Path('android/vesper-tv/app/src/main/assets/web/static/js')
          if not js_dir.exists():
              print('!! no static/js dir, skipping wrapper')
          else:
              # Wrap every entry/chunk so a runtime error in ANY of
              # them surfaces a readable message instead of the
              # CORS-masked "Script error.".  We skip ones already
              # tagged with /*WRAP*/ to stay idempotent if the
              # workflow ever re-runs against the same artifact.
              for f in sorted(js_dir.glob('*.js')):
                  if f.name.endswith('.LICENSE.txt'):
                      continue
                  body = f.read_text(encoding='utf-8')
                  if body.startswith('/*WRAP*/'):
                      continue
                  wrapped = (
                      "/*WRAP*/try{\n" + body + "\n}catch(e){\n"
                      "try{\n"
                      "  window.__bundleError = e;\n"
                      "  var stack = (e && (e.stack || e.message || String(e))) || 'unknown error';\n"
                      "  var t = document.getElementById('vesper-boot-title');\n"
                      "  var s = document.getElementById('vesper-boot-sub');\n"
                      "  var sp = document.getElementById('vesper-boot-spinner');\n"
                      "  if (t) t.innerHTML = \"ON NOW TV couldn't start\";\n"
                      "  if (s) s.innerHTML = "
                      "    \"<span style='font-size:12px;color:#A8B5C7;'>Real error from the JS bundle:</span><br/><br/>\""
                      "    + \"<pre style='text-align:left;font-size:10px;color:#FCA5A5;background:rgba(255,255,255,0.04);padding:12px;border-radius:8px;max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-all;'>\""
                      "    + (stack + '').replace(/</g,'&lt;')"
                      "    + \"</pre>\";\n"
                      "  if (sp) sp.style.display = 'none';\n"
                      "}catch(_){}\n"
                      "throw e;\n"
                      "}\n"
                  )
                  f.write_text(wrapped, encoding='utf-8')
                  print('wrapped:', f.name, 'size:', f.stat().st_size)
          PY

          echo "=== Bundled into APK assets: ==="
          ls -la android/vesper-tv/app/src/main/assets/web/ | head
          FILES=$(find android/vesper-tv/app/src/main/assets/web/ -type f | wc -l)
          echo "Total files: $FILES"
          # Fail fast if React build silently produced an empty folder
          if [ "$FILES" -lt 5 ]; then
            echo "❌ ERROR: bundled assets folder has fewer than 5 files — React build likely failed!"
            exit 1
          fi
          # Sanity check: index.html must exist and reference assets
          if [ ! -f android/vesper-tv/app/src/main/assets/web/index.html ]; then
            echo "❌ ERROR: index.html missing from bundled assets!"
            exit 1
          fi
          # Sanity check: emergent.sh script must be gone
          if grep -q "assets.emergent.sh" android/vesper-tv/app/src/main/assets/web/index.html; then
            echo "❌ ERROR: emergent script not stripped from index.html"
            exit 1
          fi
          # The id="emergent-badge" anchor element must be gone (we
          # still keep the CSS-selector string in our inline <style>
          # block as a runtime safety net, so we look for the
          # specific `id="emergent-badge"` attribute, not just the
          # bare substring).
          if grep -q 'id="emergent-badge"' android/vesper-tv/app/src/main/assets/web/index.html; then
            echo "❌ ERROR: emergent-badge anchor element not stripped from index.html"
            exit 1
          fi
          echo "=== index.html (sanitized) first 30 lines: ==="
          head -30 android/vesper-tv/app/src/main/assets/web/index.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Generate gradle wrapper + local.properties
        working-directory: android/vesper-tv
        run: |
          # Point local.properties at the Android SDK that
          # setup-android@v3 installed.
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "=== local.properties ==="
          cat local.properties
          # Generate the gradlew wrapper using the Gradle from
          # setup-gradle@v3.
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew
          ./gradlew --version

      - name: Build debug APK
        working-directory: android/vesper-tv
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f
          APK=$(find android -name "*-debug.apk" -type f | head -n1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK file found anywhere under android/"
            find android/vesper-tv/app/build -type d 2>/dev/null | head -20
            exit 1
          fi
          echo "Found APK at: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/onnowtv-v2-debug.apk"
          ls -la "$GITHUB_WORKSPACE/onnowtv-v2-debug.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnowtv-v2-debug.apk
          path: onnowtv-v2-debug.apk
          retention-days: 30

      - name: Publish/update "apk-latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: ON NOW TV V2 — latest debug build
          body: |
            Sideload-ready debug APK auto-built from the latest commit.
            React frontend is bundled inside the APK; backend calls go
            to the deployed TMDB/addons proxy.

            **v2.6.11 — "Add to My List" OK button works again**
            - 🐛 FIXED: long-pressing OK on a poster opened the
              "Add to My List" modal correctly, but pressing OK on
              the modal's confirm button did nothing.  Root cause:
              the capture-phase keyup guard was eating EVERY
              Enter/Space release while the modal was open, not
              just the first one (the long-press tail).  So the
              user's confirm press never reached the button.
            - ✅ Now eats only the FIRST keyup (the long-press
              tail), then arms the modal.  All subsequent presses
              flow through to the focused button as expected.
            - 🎨 Home rows: NO visual changes from v2.6.10.  The
              perfect row layout you confirmed is preserved
              exactly — same scale animation, same row pinning,
              no clipping, no glow added.  Only the long-press
              modal's keyboard handling was touched.

            **v2.6.10 — Fix focused poster bottom clipping**
            - 🎯 FIXED: focused poster's scale(1.08) animation was
              getting clipped at the bottom edge.  Root cause:
              `content-visibility: auto` from v2.6.8 implicitly
              applies `contain: size` which reserves the tile's
              box at its un-scaled size and clips anything painted
              past that boundary, INCLUDING the focus animation.
            - ✅ Removed `content-visibility` + `contain-intrinsic-
              size` + `contain: layout paint style` from PosterTile.
              Kept the pure GPU compositing (`translateZ(0)`,
              `will-change`).  Scrolling still feels much smoother
              than v2.6.7 thanks to compositor promotion — without
              breaking the focus scale.

            **v2.6.9 — Row pinning sits higher (no more bottom clip)**
            - 🎯 FIXED: focused poster rows were landing a touch
              too far down on 1080p, clipping the bottom edge of
              the posters against the shelves region's bottom
              boundary.  Reduced the row-pinning top padding from
              26 px → 8 px so each row sits ~18 px higher — exactly
              the "tiny bit" up the user asked for.
            - 🎯 FIXED: `contain: content` on the scroll containers
              from v2.6.8 was clipping the focused tile's
              scale(1.08) animation at the row's bottom edge.
              Removed it — virtualisation already happens at the
              tile level via `content-visibility: auto`, so the
              container-level containment was redundant AND
              harmful.

            **v2.6.8 — Native-smooth Home + Live Guide EPG fix**
            - 🚀 Home shelves now feel RecyclerView-smooth: every
              tile uses `content-visibility: auto` (the WebView's
              native view-recycling primitive), GPU compositing
              (`translateZ(0)`, `will-change`), and `contain: layout
              paint style` so off-screen tiles cost the renderer
              zero.  No more chunky scrolling on the HK1.
            - 📺 FIXED: Live Guide overlay now shows what's on each
              channel the moment you open it — even if you launched
              the channel from Continue Watching / Home / Hero
              without visiting the Live TV page first.  The cached
              channels + EPG are pushed to the native player at
              app startup (and re-pushed every 2 s for 10 s after
              boot in case the cache hydrates slightly late).
            - 🔧 RecyclerView is already powering the in-player
              Live Guide overlay (channels list + categories pills).
              The Home shelves stay in React/WebView because porting
              them to native would mean rewriting every page as a
              Kotlin Activity — but the new CSS pipeline gets you
              ~95% of the same smoothness with none of that work.

            **v2.6.7 — Home row pinning + flush row scrolling**
            - 🎯 FIXED: home page rows would land at slightly
              different vertical positions when navigating Up/Down
              between them — sometimes cut off at the bottom,
              sometimes drifting up.  The scrollIntoView call was
              using `block: 'nearest'` which scrolls the minimum
              amount to bring the tile on-screen, so each row
              parked wherever the previous row's height left it.
            - ✅ Row pinning: now scrolls the ENTIRE shelf section
              (not the tile) to `block: 'start'` on every row
              change, with a matching `scroll-padding-top` on the
              shelves container.  Result: every Down / Up press
              lands the focused row at exactly the same Y position,
              identical to how a native RecyclerView snaps rows.

            **v2.6.6 — THE Watch Together fix (HashRouter query-string bug)**
            - 🎯 ROOT CAUSE finally identified: inside the APK the
              app runs from `file://` which forces React Router
              into **HashRouter** mode.  In HashRouter, the URL is
              `file://.../index.html#/resolve/movie/123?party=XYZ`
              — the `?party=XYZ` is INSIDE the hash, so
              `window.location.search` returns EMPTY.
            - 📌 `Resolve.jsx` was reading `window.location.search`
              to forward party context through the tmdb→imdb hop.
              Result: every party redirect silently dropped the
              `?party=…` query, so Detail.jsx never knew it was in
              a party and rendered the regular picker.
            - ✅ Fix: switched to `useLocation().search` from
              react-router, which works identically under both
              HashRouter (APK) and BrowserRouter (preview/dev).
              This is why the bug never reproduced in preview no
              matter how many fixes I attempted — preview uses
              BrowserRouter so `window.location.search` worked
              there but failed silently on the box.

            **v2.6.5 — Bulletproof Watch Together + Load existing profile**
            - 🎯 PERMANENT fix for "Start Party shows the picker
              instead of just playing": the Detail page now renders
              a dedicated full-screen "Starting your party…" screen
              when the URL has `?party=…`.  The stream picker is
              not mounted at all — there's no clickable button to
              tap, no race condition, nothing to confuse anyone.
            - 🔄 Cancel + Retry built into the joining screen: if
              you ever do get stuck, one tap reloads the page; one
              tap leaves the party.  Never silently broken again.
            - 💾 NEW "Load existing profile" on the profile picker:
              if you've saved a backup on another device (Settings
              → Backups → Save), tap the new neon button on the
              "Who's ready to watch?" screen, enter your 6-character
              code + PIN, and your profiles + library + Continue
              Watching are restored.  Beautiful focused TV-friendly
              keypad, no copy-paste needed.

            **v2.6.4 — Working auto-update installer + gate fixes**
            - 🔧 FIXED: The in-app update gate's "Download and install"
              button is now actually wired through to a native
              installer.  Previous builds fell through to a naked
              `window.location.href = apk_url` which silently stalled
              the WebView with no download ever starting.
            - 📥 New native bridge `OnNowTV.installApk(url)`: uses
              Android's `DownloadManager` to fetch the APK with the
              standard system notification + retry handling, then
              hands the file to the platform PackageInstaller via a
              FileProvider content:// URI.
            - 📊 Live progress: the gate now shows a progress bar +
              percentage as the APK downloads, sourced from real
              `DownloadManager` events.
            - 🌐 Fallback row: "Open in browser" + "Copy download
              link" buttons are always visible so you're NEVER
              stranded — even if the native installer hits a snag,
              you can grab the URL and install manually.
            - 🖤 Z-index fix: the gate now has an opaque base layer
              behind its radial glow, so the profile picker no
              longer bleeds through at the top of the screen.
            - 🔒 Manifest: REQUEST_INSTALL_PACKAGES permission added;
              when Android prompts you to allow installs from
              unknown sources, tap **Allow** once and the gate
              becomes fully automatic going forward.

            **v2.6.3 — Watch Together bulletproof autoplay + diagnostics**
            - 🛡️ FIXED (3rd recurrence): "Start Party → both end on the
              manual stream picker, host plays solo, guest does nothing."
              The autoplay guard is now a hybrid REF + STATE pattern so
              the JOINING-WATCH-PARTY overlay always tracks reality AND
              the deferred `playStream` can't be self-cancelled by its
              own state-update.
            - 🦮 Autoplay watchdog: separate 5-second safety net that
              re-fires the pick + playStream if the primary autoplay
              didn't run.  No more permanently-stranded party members.
            - 🧷 WS-open-aware lobby send: `Start Party` now waits up
              to 2.5 s for the WebSocket to reach OPEN before sending
              `play`.  Previously a fast click could silently drop the
              message and leave both members hung in the lobby.
            - 🌀 Start Party button shows disabled / spinner / error
              states so you always know what's happening.
            - 🍞 Diagnostic breadcrumb trail in
              `localStorage["vesper-party-breadcrumbs"]` capturing the
              full party lifecycle (lobby connect → joined → send →
              navigate → streams → autoplay → native/web bridge).
              Mirrored to `console.log` so adb logcat sees them live.

            **v2.6.2 — Premium Live TV overlay redesign**
            - 🎨 NEW: Beautiful premium Live Guide overlay.  Drop
              the old full-screen design — the new one is a 460dp
              edge panel that **slides in from the LEFT** with the
              video still playing fully visible to the right.
            - 📺 Slide-in shortcuts: press **D-pad LEFT** anywhere
              while watching (no controls visible) → guide slides
              in.  GUIDE / CHANNEL_UP / TV_INPUT remote keys still
              work.
            - 🃏 Floating programme detail card in the bottom-right
              corner: backdrop image, channel logo on glass plate,
              red LIVE pill, programme title, time range, neon-cyan
              progress bar, and Next-on preview.  Updates in real-
              time as you D-pad through the channel list.
            - 🏷️ Category filter pills at the top of the panel
              (horizontal scroll) instead of the old categories
              column — channel list gets all the vertical space.
            - 🎯 Premium aesthetic: dark glass + cyan accent +
              monospace eyebrows.  No traditional player buttons
              anywhere in the overlay.
            - 🔢 Each channel row shows its **per-category channel
              number** as a monospace badge (e.g. 003), matching
              the reference IPTV designs you sent.
            - ⚡ Same in-place stream swap — sub-second tune-in.

            **v2.6.1 — Bug-fix batch + Cast reveal pattern**
            - 🐛 Home: removed the **duplicate focus border** on tiles
              (Chrome's default `:focus-visible` outline was rendering
              ON TOP of our custom box-shadow ring).
            - 💾 Backup "bytes size too large" fixed — server limit
              bumped to 12 MB AND the EPG / TMDB / channel caches
              are now excluded from backups (regenerable server-side).
            - ✋ Long-press to add to library now works in
              Networks / Movies / TV catalogue pages on the box
              (NetworkPosterTile wired into the same useLongPress
              hook as Home).
            - 🎭 NEW Cast reveal pattern: tap an actor in the cast
              row → the strip TRANSFORMS in-place into that actor's
              filmography (with a "Back to cast" pill + a "Full
              profile →" link to the dedicated profile page).
            - 🎬 Filmography accuracy massively improved: backend
              now filters out talk-show / news / self appearances,
              1-episode guest spots, and obscure entries with no
              poster.  Solves the "some movies don't even have that
              actor in them" issue.
            - 📺 Sports guide now shows **broadcast channels for
              100% of fixtures** (was ~5%).  Added curated league →
              channel mapping covering 60+ leagues across UK/US/AU.

            **v2.6.0 — Cast + "More like this" + Actor profiles +
            In-app Update Gate**
            - 🎭 NEW: Beautiful B&W cast strip below the Play button
              on every movie + TV detail page.  D-pad / scroll
              focus on an actor instantly swaps the page hero
              backdrop to their portrait + name.
            - 🎬 NEW: Click any actor → full Actor Profile page
              (`/person/:id`) with B&W hero, age, birthplace, bio,
              and a "Known for" filmography grid.  Tap any film to
              jump straight to its detail page.
            - 🍿 NEW: "More like this" recommendations row beneath
              the cast row.  Powered by TMDB's collaborative
              filtering (+ /similar fallback for obscure titles).
            - 🔔 NEW: In-app **forced Update Gate**.  When a new
              APK is published to GitHub Releases, the next launch
              shows a beautiful fullscreen "Update required" prompt
              with the release notes and a one-tap "Download and
              install" button.  No more shipping APK files manually.

            **v2.5.8 — Mobile polish pass**
            - 📱 NEW: 5th "More" tab in the mobile bottom nav opens
              a beautiful bottom sheet with EVERY secondary
              destination (Sports, TV Shows, Movies, Watch Together,
              Profiles, Sources, Settings) — phone users now have
              feature-parity with the TV side-rail.
            - 🔑 NEW: Kids mode on mobile now shows a floating "EXIT
              KIDS" pill in the top-right (the desktop KidsSideNav
              Exit row is hidden on phones for space reasons —
              previously left parents trapped in kids mode).
            - ⌨️ TV-keyboard auto-falls-back to the native OS keyboard
              on phones — the 10-column TV grid is impossible to use
              on a 360 px screen.  Fully thumb-friendly with the
              right autocapitalize / inputMode hints.
            - 👆 Fixed touch scroll being eaten by long-press handler.
              Now tracks finger movement; >8 px of slide = scroll
              gesture, no longer fires tap or "Add to My List" modal.
              Tap-and-hold (no movement) still triggers the modal.
            - 🛰️ Live TV mobile flow: tapping a channel now SELECTS
              it (showing its Now/Next guide); tap again to play.
              No more accidentally tuning the wrong channel when you
              just wanted to peek at what's on.
            - 🍿 Network catalogue pages (Netflix / HBO / Disney+)
              now use the full mobile width — was rendering 2 thin
              tile-columns with huge wasted side gutters.
            - 🪡 Profile create flow on mobile: removed the duplicate
              "Continue" + "Your name" pill rows; the native input
              from the keyboard fallback covers both jobs.

            **v2.5.7 — In-player Live Guide overlay**
            - 🛰️ NEW: While a live channel is playing, press the
              "Channels" button (or the GUIDE / channel-up / TV-input
              key on your remote) to slide in a beautiful in-player
              channel browser without stopping playback.
            - 🎨 Two-pane design: categories rail on the left + tall
              channel cards on the right with logo + Now/Next EPG +
              live progress bar.  Currently-playing channel marked
              with an "ON NOW" pill + auto-focused on open.
            - ⚡ Channel switching is in-place (libVLC swaps Media
              without restarting the Activity) so it feels instant —
              you see the new channel name flash on the cinematic
              preview poster and the first frame decodes in ~1 s.
            - 🌐 Categories + EPG come straight from the WebView's
              fully-loaded EPG store (gzipped server cache from
              v2.5.x) so the guide is instantly populated.

            **v2.5.6 — FIX: Crash on launch for Android 16 (Fold 7,
            Pixel 8, Pixel 9, Galaxy S25)**
            - 🐛 `applyImmersiveMode()` ran before `setContentView()`
              which threw `NullPointerException` on
              `window.insetsController` because Android 16 lazy-
              creates the DecorView only when content is attached.
              We now (a) touch `window.decorView` first to force
              creation, (b) null-guard the controller, and (c) skip
              the eager onCreate call entirely (we already invoke
              immersive mode from `onWindowFocusChanged`).
            - 🩺 Crash logger from v2.5.4 stays in — any future
              Android-version-specific surprises will surface the
              exact stack trace instead of crashing silently.

            **v2.5.5 — Watch Together: zero buffer + ~1 s tighter sync**
            - 🎬 Fixed the buffer-on-countdown issue.  libVLC's
              network cache was 1.5 s, which drained during the
              stage-1 ready handshake; the guest had to re-buffer
              the moment the countdown fired.  Cache is now 5 s.
            - ⚡ Tightened the host→guest heartbeat from 2 s to 1 s
              AND added wallclock-projection on the guest side
              (positionMs + (now - serverMs)).  Perceived host-vs-
              guest delay drops from ~2 s to ~300-500 ms.
            - 🐛 Fixed: the host's player stayed silently paused
              after the countdown if the user tapped "Start the
              Party" — host now auto-resumes alongside the guests.

            **v2.5.4 — Crash diagnostics + Samsung Auto Blocker note**
            - 🩺 NEW: Built-in crash logger.  If the app fails to
              launch, the next launch shows a black screen with the
              exact stack trace + Share / Copy buttons.  No more
              silent close-on-tap mysteries.
            - 🔒 Samsung Fold / Galaxy users — if the app crashes on
              tap with no error dialog, disable Samsung **Auto
              Blocker** (Settings → Security and privacy → Auto
              Blocker → turn off "Block app installs from
              unauthorised sources" + "Block harmful apps").  Sammy's
              new defence-in-depth feature silently kills debug-
              signed sideloaded apps on launch.

            **v2.5.3 — Mobile-ready (Samsung Fold + every Android phone)**
            - 🐛 Fixed crash-on-launch on phones caused by the
              launcher activity forcing landscape with translucent
              system bars.  Phone users now get OS-preferred
              orientation; only TVs lock to landscape.
            - 📱 Full mobile UI when installed on a phone: sticky
              bottom-tab nav, touch-friendly buttons, single-column
              hero, tightened paddings.  No TV regressions.
            - 🎬 Watch Together now works for TV Shows — host picks
              the episode in a new season/episode picker, all party
              members autoplay the same episode in sync.
            - ⏩ Live TV boot "SKIP" button auto-focuses for instant
              OK press on the remote.

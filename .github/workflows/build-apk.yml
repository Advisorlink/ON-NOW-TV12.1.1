name: Build ON NOW TV V2 APK

# Workflow:
#   1. Build the React app with the live REACT_APP_BACKEND_URL baked in
#      (so the bundled APK still talks to the deployed backend for
#      TMDB / Stremio addons).
#   2. Copy the build output into android/vesper-tv/app/src/main/assets/web/
#      so the WebView loads it from file:///android_asset/.
#   3. Build the debug APK.  Publish artifact + auto-update Release.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release
  actions: write    # needed by the storage-cleanup step to delete old artifacts + runs

env:
  # Live deployed backend URL — the APK bakes this into the
  # production JS bundle, so the sideloaded app keeps fetching real
  # TMDB and addon data without any preview-URL dependency on the
  # frontend side.
  # v2.6.79: TEMPORARY rollback to the PREVIEW URL while the
  # production deployment at `rebrand-app-5.emergent.host` is
  # returning Cloudflare 520 / nginx 502.  Preview pod is rock-
  # solid so this keeps clients working while we (a) wait for
  # Emergent support to fix prod OR (b) migrate to a Contabo VPS.
  # Will swap to the Contabo domain (vesper.tv / similar) once
  # the VPS is provisioned.
  REACT_APP_BACKEND_URL: https://onnowtv.duckdns.org

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn deps
        working-directory: frontend
        run: yarn install --network-timeout 600000

      - name: Build React app (production)
        working-directory: frontend
        env:
          CI: 'false'  # don't fail the build on lint warnings
          GENERATE_SOURCEMAP: 'false'
          DISABLE_ESLINT_PLUGIN: 'true'
        run: |
          yarn build
          echo "=== React build output: ==="
          ls -la build/
          echo "=== JS bundle: ==="
          ls -la build/static/js/ 2>/dev/null | head -5

      - name: Bundle frontend into Android assets
        run: |
          rm -rf android/vesper-tv/app/src/main/assets/web
          mkdir -p android/vesper-tv/app/src/main/assets/web
          cp -r frontend/build/. android/vesper-tv/app/src/main/assets/web/

          # --- Strip Emergent preview / PostHog telemetry from the
          # bundled index.html.  These scripts inject the "You're
          # viewing a static preview — Resume to interact" banner and
          # the "Made with Emergent" badge, both of which show up on
          # the sideloaded APK because the WebView fetches them over
          # the internet.  We want a clean, branded experience inside
          # the box, so we surgically remove them at bundle time.
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('android/vesper-tv/app/src/main/assets/web/index.html')
          html = p.read_text(encoding='utf-8')
          # 1) Remove the emergent-main.js loader script.
          html = re.sub(
              r'<script[^>]*assets\.emergent\.sh[^>]*></script>\s*',
              '', html, flags=re.IGNORECASE)
          # 2) Remove the "Made with Emergent" badge anchor element.
          html = re.sub(
              r'<a\s+id="emergent-badge"[\s\S]*?</a>\s*',
              '', html, flags=re.IGNORECASE)
          # 3) Remove the PostHog telemetry init script block.
          html = re.sub(
              r'<script>\s*!\(function\s*\([^)]*\)\s*\{[\s\S]*?posthog\.init\([\s\S]*?\}\);?\s*</script>\s*',
              '', html, flags=re.IGNORECASE)
          p.write_text(html, encoding='utf-8')
          print('=== index.html cleaned of Emergent / PostHog tracking ===')
          PY

          # --- Wrap each main JS chunk in try/catch so any runtime
          # failure on the box becomes a readable error string in the
          # boot splash diagnostic panel — instead of a CORS-masked
          # "Script error." with no message (the default behaviour
          # for any file:// loaded script on Android WebView).
          python3 - <<'PY'
          import pathlib, re
          js_dir = pathlib.Path('android/vesper-tv/app/src/main/assets/web/static/js')
          if not js_dir.exists():
              print('!! no static/js dir, skipping wrapper')
          else:
              # Wrap every entry/chunk so a runtime error in ANY of
              # them surfaces a readable message instead of the
              # CORS-masked "Script error.".  We skip ones already
              # tagged with /*WRAP*/ to stay idempotent if the
              # workflow ever re-runs against the same artifact.
              for f in sorted(js_dir.glob('*.js')):
                  if f.name.endswith('.LICENSE.txt'):
                      continue
                  body = f.read_text(encoding='utf-8')
                  if body.startswith('/*WRAP*/'):
                      continue
                  wrapped = (
                      "/*WRAP*/try{\n" + body + "\n}catch(e){\n"
                      "try{\n"
                      "  window.__bundleError = e;\n"
                      "  var stack = (e && (e.stack || e.message || String(e))) || 'unknown error';\n"
                      "  var t = document.getElementById('vesper-boot-title');\n"
                      "  var s = document.getElementById('vesper-boot-sub');\n"
                      "  var sp = document.getElementById('vesper-boot-spinner');\n"
                      "  if (t) t.innerHTML = \"ON NOW TV couldn't start\";\n"
                      "  if (s) s.innerHTML = "
                      "    \"<span style='font-size:12px;color:#A8B5C7;'>Real error from the JS bundle:</span><br/><br/>\""
                      "    + \"<pre style='text-align:left;font-size:10px;color:#FCA5A5;background:rgba(255,255,255,0.04);padding:12px;border-radius:8px;max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-all;'>\""
                      "    + (stack + '').replace(/</g,'&lt;')"
                      "    + \"</pre>\";\n"
                      "  if (sp) sp.style.display = 'none';\n"
                      "}catch(_){}\n"
                      "throw e;\n"
                      "}\n"
                  )
                  f.write_text(wrapped, encoding='utf-8')
                  print('wrapped:', f.name, 'size:', f.stat().st_size)
          PY

          echo "=== Bundled into APK assets: ==="
          ls -la android/vesper-tv/app/src/main/assets/web/ | head
          FILES=$(find android/vesper-tv/app/src/main/assets/web/ -type f | wc -l)
          echo "Total files: $FILES"
          # Fail fast if React build silently produced an empty folder
          if [ "$FILES" -lt 5 ]; then
            echo "❌ ERROR: bundled assets folder has fewer than 5 files — React build likely failed!"
            exit 1
          fi
          # Sanity check: index.html must exist and reference assets
          if [ ! -f android/vesper-tv/app/src/main/assets/web/index.html ]; then
            echo "❌ ERROR: index.html missing from bundled assets!"
            exit 1
          fi
          # Sanity check: emergent.sh script must be gone
          if grep -q "assets.emergent.sh" android/vesper-tv/app/src/main/assets/web/index.html; then
            echo "❌ ERROR: emergent script not stripped from index.html"
            exit 1
          fi
          # The id="emergent-badge" anchor element must be gone (we
          # still keep the CSS-selector string in our inline <style>
          # block as a runtime safety net, so we look for the
          # specific `id="emergent-badge"` attribute, not just the
          # bare substring).
          if grep -q 'id="emergent-badge"' android/vesper-tv/app/src/main/assets/web/index.html; then
            echo "❌ ERROR: emergent-badge anchor element not stripped from index.html"
            exit 1
          fi
          echo "=== index.html (sanitized) first 30 lines: ==="
          head -30 android/vesper-tv/app/src/main/assets/web/index.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Generate gradle wrapper + local.properties
        working-directory: android/vesper-tv
        run: |
          # Point local.properties at the Android SDK that
          # setup-android@v3 installed.
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "=== local.properties ==="
          cat local.properties
          # Generate the gradlew wrapper using the Gradle from
          # setup-gradle@v3.
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew
          ./gradlew --version

      - name: Build debug APK
        working-directory: android/vesper-tv
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f
          APK=$(find android -name "*-debug.apk" -type f | head -n1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK file found anywhere under android/"
            find android/vesper-tv/app/build -type d 2>/dev/null | head -20
            exit 1
          fi
          echo "Found APK at: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/onnowtv-v2-debug.apk"
          ls -la "$GITHUB_WORKSPACE/onnowtv-v2-debug.apk"

      - name: Publish/update "apk-latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: ON NOW TV V2 — latest debug build
          body: |
            Sideload-ready debug APK auto-built from the latest commit.
            React frontend is bundled inside the APK; backend calls go
            to the deployed TMDB/addons proxy.

            **v2.7.03 — M14 Live Guide native rewrite (Kotlin/XML)**
            - 🛰️ **Implemented the long-pending M14 reference design**
              for the native Android Live Guide overlay
              (`LiveGuideController.kt` + `activity_vlc_player.xml`).
              The legacy 460 dp left panel + floating right detail
              card is gone; the screen now reads as a single
              cinematic surface:
                • **Top header strip:** focused channel logo +
                  name + `● LIVE` pill on the left, big monospaced
                  clock + day/date on the right.  Clock auto-ticks
                  every 30 s while the guide is open.
                • **Full-width vertical channel list** with the
                  focused row scaled 1.12× and shifted 24 px right
                  with a 24 dp elevation glow — the row literally
                  "lifts off the page" so you feel the D-pad.
                • **Bottom rail (360 dp):**  large "On Now" poster
                  card on the left (reuses the existing
                  detail_channel_logo / detail_programme_title /
                  detail_time_range / detail_progress IDs so all
                  controller binding survives) + four "NEXT,
                  NEXT +1, NEXT +2, NEXT +3" cards on the right,
                  each binding the next 4 EPG entries for the
                  focused channel.
            - 🎬 **Cinematic open/close choreography.** Header
              drops from above (-60 → 0 px, 280 ms), list cross-
              fades (260 ms with 80 ms delay), rail rises from
              below (+120 → 0 px, 320 ms with 60 ms delay).  Mirror
              animations on close.
            - 🪛 **Backward-compatible.**  All retired IDs
              (`guide_panel`, `guide_detail`, `guide_title`,
              `guide_subtitle`, `guide_hint`, `detail_next`, all
              `detail_chip_*`, `detail_description`,
              `detail_divider`) are kept as 0×0 invisible stubs so
              `LiveGuideController.findViewById` never returns null
              and no code path crashes.  Once the controller is
              fully ported off the legacy IDs we can remove these
              stubs.
            - 📐 Updated `item_guide_channel.xml` with
              `clipChildren="false"` so the 1.12× focus scale
              doesn't clip; same flag added to the RecyclerView
              and the list-wrap FrameLayout.
            - 🆙 APK bumped to **v2.7.03** (versionCode 173).

            **v2.7.02 — Only ONE focus ring at a time · eyebrow brand-blue restored**
            - 🎯 **Real root cause of "two blue rings around the
              covers" (user clarified the previous v2.7.01 fix
              misread the symptom).**  Multiple components
              (`Home.jsx`, `Detail.jsx`, `Settings.jsx`,
              `WatchTogether.jsx`) set `data-focused="true"`
              directly on initial-focus priming, but the global
              `useSpatialFocus.setFocusAttr` only cleared the
              `lastFocused` element tracked in its own closure
              variable.  So a tile primed by Home.jsx (or another
              page) kept its `data-focused` attribute when the user
              D-pad-navigated away, painting a SECOND blue ring on
              screen alongside the actually focused tile.
            - 🛡️ **Fix:** `setFocusAttr` now does a document-wide
              sweep of `[data-focused="true"]` and removes the
              attribute from every element except the new focus
              target on every key press.  Also defensively clears
              stragglers from interrupted long-presses or
              press-ripples (`data-holding`, `data-pressed`) so
              those animations can't keep painting a ring on a
              tile after the user has moved on.
            - 🔵 **Eyebrow brand-blue restored.**  v2.7.01 muted
              the `.vesper-eyebrow` colour to white-on-dark on the
              mistaken theory that it was competing with the focus
              ring.  User clarified that the issue was actual
              duplicate rings around tile covers, not the brand
              accent.  Eyebrow now reads in `var(--vesper-blue)`
              again ("FOR YOU", "MOVIES", "TV SERIES" pop with
              brand colour); the "X LEFT" caption inside CW tiles
              also reverted to brand blue.
            - 🆙 APK bumped to **v2.7.02** (versionCode 172).

            **v2.7.01 — Continue Watching cards no longer clipped on projector · single neon-blue focus indicator**
            - 📺 **CW cards fully visible on 1080p projector / TV.**
              User reported via photo that the bottom half of the
              Continue Watching cards was being cut off by the
              projector's safe area.  Two-part fix:
              (a) **Hero billboard shrunk** from `clamp(360, 56vh,
              620px)` → `clamp(340, 50vh, 540px)` — reclaims ~80 px
              of vertical real estate on a 1080p TV.
              (b) **CW section paddingTop tightened** from
              `clamp(28, 3vw, 56px)` → `clamp(18, 2vw, 32px)` so
              the row sits ~20 px higher.  Combined, the full card
              including the 4 px progress bar at the bottom is now
              inside the projector's safe-area on the user's setup.
            - 🎯 **Only ONE blue highlight on screen at a time.**
              User reported "two blue highlights when you move
              around" — the `.vesper-eyebrow` brand label ("FOR YOU",
              "MOVIES", "TV SERIES") was painted in
              `var(--vesper-blue)` on every shelf, and the focused
              tile's border was ALSO blue → visually competing.
              Muted the eyebrow from neon blue to
              `rgba(255,255,255,0.55)` (soft white).  Same change
              applied to the "X LEFT" caption inside CW tiles
              (`rgba(255,255,255,0.72)`).  Now the **only** neon-blue
              element on screen at any time is the actively focused
              tile / button.  Brand identity preserved via the wide
              letter-spacing + uppercase monospace face — colour
              doesn't need to also scream for attention.
            - 🆙 APK bumped to **v2.7.01** (versionCode 171).

            **v2.7.00 — Continue Watching cards: stacking-context fix · clean flex layout · no more clipped bottoms**
            - 🩹 **Root cause of "card bottoms get cut off" (P0 user report).**
              `.vesper-shelf-section` carries `contain: layout style`
              which makes each shelf its OWN stacking context.  So
              even though the focused tile sets `z-index: 50`, that
              z-index is **scoped to its own section** — the next
              shelf below (DOM order) paints on top of any overflow
              from the focus `scale(1.08)` animation and clips the
              bottom edge (progress bar + "X LEFT" caption on the
              Continue Watching tile, focus ring on regular posters).
            - 🛡️ **Fix 1 — CSS stacking lift.** Added
              `.vesper-shelf-section:has([data-focused="true"]) {
              z-index: 20; }` to `/app/frontend/src/index.css`.
              The section containing the active tile now paints
              above its siblings, so the focus-scale overflow is
              never clipped.  `:has()` is Chrome 105+ which the
              HK1 WebView supports; older WebViews degrade
              gracefully (row still renders, just clips a couple
              of pixels on focus like before).
            - 🛡️ **Fix 2 — Continue Watching layout rewritten.**
              `ContinueWatchingShelf.jsx` previously stacked an
              absolutely-positioned play badge at `bottom: 38`,
              title block at `bottom: 22` with a `paddingLeft: 46`
              hack to dodge the badge, and the 6 px progress bar at
              `bottom: 0`.  Fragile + the "X LEFT" mono caption was
              clipping into the progress bar when cards were
              enlarged.  Rewrote as one flex column at `bottom: 14`
              with `gap: 6` — play badge inline with title, "X LEFT"
              underneath, slim 4 px progress bar flush at the
              bottom.  Guaranteed spacing at every breakpoint.
            - 🛡️ **Fix 3 — Section bottom padding restored.** CW
              `<section>` was `paddingBottom: 0` (zero!) — focus
              scale had literally nowhere to grow.  Mirrored the
              top spacing: `paddingBottom: 'clamp(18px, 2vw, 36px)'`.
            - 🆙 APK bumped to **v2.7.00** (versionCode 170).

            **v2.6.99 — Spatial nav double-fire fix · Hero Right no longer jumps focus out of the row**
            - 🎯 **Root-cause fix for the Hero D-pad "Right jumps me
              back up" bug.**  `HeroBillboard.jsx` already had a
              local `onKeyDown` handler that clamped Left/Right
              within the three action buttons and called
              `e.preventDefault()` + `e.stopPropagation()`.  But
              React's synthetic `stopPropagation()` does **not**
              prevent the native event from continuing to bubble to
              `window` — so after the local handler clamped focus,
              the global spatial engine in `useSpatialFocus.js`
              also ran on the same keypress and yanked focus to a
              neighbouring shelf tile or nav rail item, producing
              the visible "double move / jump out of buttons"
              symptom.
            - 🛡️ **Fix:** added `if (e.defaultPrevented) return;` as
              the very first statement in the window-level keydown
              handler in `useSpatialFocus.js`.  Now any component
              that calls `preventDefault()` on Arrow keys (Hero
              buttons, or any future scoped-nav component) short-
              circuits the global engine cleanly.  Verified: one
              ArrowRight from Play lands exactly on More Info (not
              skipping to My List); ArrowRight on My List clamps
              (no out-of-row jump).  6/6 hero spatial-nav
              assertions pass under the frontend testing harness.
            - 🆙 APK bumped to **v2.6.99** (versionCode 169).

            **v2.6.98 — UX fixes from user video: covers · notifications · navigation · trailers · unlock**
            - 📚 **Library covers no longer get cut off** — collapsible
              wrapper only kicks in when a section actually has more
              than the threshold items (TV > 6, Actors > 8).  Below
              that the grid renders at its natural height so the
              bottom row of cards is never clipped.
            - 🔔 **Notifications moved out of Library rows** —
              replaced with a **Reminders pill in the top-right of
              the Library header** with a badge count.  Click → a
              popover slides in from the top with every notify-list
              entry, open + remove buttons per row, and Escape /
              Backspace to close.
            - 🎯 **Home focus respects scroll position** — pressing
              the Home button in the side nav or returning from a
              menu now focuses the first card of the **first
              VISIBLE row in the viewport** instead of always
              snapping to the top shelf.  Walks the focusables and
              picks the one whose middle Y is between 120 px and
              `viewport-80 px`.
            - ⬅️➡️ **Hero buttons clamp Left/Right within the row**
              — pressing Right on the My List button no longer
              "jumps you back up" to the title.  Hero buttons now
              own their own arrow handler that scopes to the
              `data-hero-actions` container and refuses to leave
              the row sideways (Up/Down still works as expected).
            - 🎬 **Upcoming-trailer row aligned with other rows** —
              header + cards padding `clamp(92,6.5vw,132)` →
              `clamp(40,4.2vw,80)` so the first trailer card lines
              up dead-centre with the first poster of the rows
              above.  **Glow effect removed** on focus — replaced
              with the standard cyan border outline + small lift to
              match every other row.
            - 🔓 **Settings "Unlock (testing)" now reveals empty
              addon catalog rows** — `useLiveShelves` keeps empty
              catalogs in the list when unlock is on and Shelf.jsx
              renders a diagnostic stub showing addon name +
              catalog title + error so you can see exactly which
              addon catalog returned 0 items.  Toggling the unlock
              setting busts the shelves cache so the change applies
              instantly without a hard reload.
            - 🆙 APK bumped to **v2.6.98** (versionCode 168).

            **v2.6.97 — Sports Guide trimmed to 72 h window**
            - 📅 **Sports Guide now shows Today + Tomorrow +
              Day-After only** (3-tile day strip instead of 7).
              Events are filtered to a kickoff window of −6 h
              (recent live results) through +72 h (next 3 days)
              before they reach the matcher / cards.  More relevant,
              less clutter, faster to scan, and avoids matching
              against EPG slots that aren't populated yet.
            - 🆙 APK bumped to **v2.6.97** (versionCode 167).

            **v2.6.96 — Sports auto-aliases · Upcoming trailers · Auto-show modal · Library Notifications + collapsible · Native Host dock**
            - 🏈 **Sports matcher: auto-aliases for ALL leagues**.
              Previous matcher only knew Premier League / NRL / IPL /
              etc. — niche teams (NCAA, Chinese Super League, KBO,
              Allsvenskan, etc.) never produced chips.  Now every
              team name is auto-aliased to its first + last
              distinctive token PLUS a low-confidence "league + sport
              keyword" fallback when no team name appears in the
              EPG.  Example: "NC State Wolfpack" → matches "Duke vs
              NC State" / "ACC Basketball: Wolfpack v Devils".
            - 🎬 **Upcoming Movies → 16:9 trailer rectangle cards**
              with a centred Play badge on hover/focus.  Backend
              now filters strictly to **English-language US/UK
              releases** with popularity ≥ 6 (no Korean / Japanese /
              Chinese / Hindi titles per user spec).  Each card
              includes the resolved YouTube trailer key; clicking
              a card lands you on Detail with `?autoplay-trailer=1`
              so the trailer fires immediately.
            - 🎯 **StreamUnavailableModal auto-shows** the moment
              stream-loading completes with zero playable streams —
              no more inert Play button.  Adding to the notify list
              auto-dismisses the modal (350 ms delay so the user
              sees the "Added" state momentarily).
            - 🔔 **Library "Notifications" section** added — shows
              every title you've opted into "notify me when
              streams drop" with poster, title, and a 🗑 remove
              icon.  Click a card to open Detail.
            - 📂 **Library collapsible sections** — TV Shows,
              Notifications, and My Actors collapse to 2 rows by
              default with a fade-out gradient at the bottom hinting
              there's more.  Click the • • • button next to the
              section heading to expand to full height; click again
              (now a ↑ chevron) to collapse.  Only appears when the
              section has more than 6 (TV / Notifications) or 8
              (Actors) items.
            - 🎚️ **Native VlcPlayerActivity HOST dock REDESIGNED**.
              The old labelled-button strip is gone — replaced with
              the same H3 curved glass dock from the React side.
              Bottom-centred translucent rounded bar with 5
              circular bubble buttons (⏸ ⏩ ⟳ 🔒 💬).  Focus
              animates 12 % up + 12 % bigger with a cyan halo,
              matching the JS dock pixel-for-pixel.  This is the
              "Apple-looking curved one" you asked for — visible
              when the native VLC player is the host in a Watch
              Together party.
            - 🆙 APK bumped to **v2.6.96** (versionCode 166).

            **v2.6.95 — Settings page tightened · B&W library actors · Auto-deploy backend on push**
            - 📐 **Settings page made more compact** — page padding,
              H1, section headers, and ToggleRow paddings/font sizes
              all dropped ~30 % to match a "proper settings page"
              density (closer to iOS / macOS System Settings than a
              marketing hero).  Same dark theme, same blue accents,
              same focus states — just easier to navigate.  Max
              width capped at 1100 px so wider screens get the
              same scannable column instead of stretching.
            - 🎭 **Library actor portraits → black & white**.
              Library's actor grid now renders profile photos with
              `grayscale(1) contrast(1.05)` for a curated magazine
              look that visually separates "saved actors" from the
              colour cast-rows on Detail pages.
            - 🚀 **NEW: Auto-deploy backend on every push to main**.
              New workflow `.github/workflows/deploy-backend.yml`
              rsync's `/app/backend/` → `/opt/onnowtv/backend/` on
              the Contabo VPS, pip-installs requirements, restarts
              the systemd service, and hits the public HTTPS
              endpoint as a smoke test.  All you need is a one-time
              repo secret `VPS_SSH_PASSWORD`.  No more manual VPS
              syncs after "Save to GitHub".
            - 🆙 APK bumped to **v2.6.95** (versionCode 165).

            **v2.6.94 — Upcoming Movies diagnostic · Settings "Unlock" · StreamUnavailableModal autoplay path · EPG disk shrink**
            - 🐛 **Stream Unavailable modal wasn't firing on
              autoplay**.  When tapping a poster (which navigates
              to Detail with `?autoplay=1`), the autoplay useEffect
              bailed out silently when streams were empty —
              leaving the user staring at an inert Play button.
              Now the autoplay path also calls
              `setShowUnavailableModal(true)` when streams loading
              finishes with zero playable streams, matching the
              manual Play-button behaviour.
            - 🔓 **New "Unlock (testing)" toggle in Settings →
              General**.  Stored in localStorage as
              `onnowtv-dev-unlock`.  When ON, the Home page's
              Upcoming row renders a diagnostic banner whenever
              the upcoming-movies API returns empty/404 — telling
              you exactly why the row isn't showing (e.g. backend
              missing the endpoint, in which case the VPS needs
              the latest FastAPI code).

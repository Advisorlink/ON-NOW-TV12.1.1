name: Build ON NOW TV V2 APK

# Workflow:
#   1. Build the React app with the live REACT_APP_BACKEND_URL baked in
#      (so the bundled APK still talks to the deployed backend for
#      TMDB / Stremio addons).
#   2. Copy the build output into android/vesper-tv/app/src/main/assets/web/
#      so the WebView loads it from file:///android_asset/.
#   3. Build the debug APK.  Publish artifact + auto-update Release.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release

env:
  # Live deployed backend URL — the APK bakes this into the
  # production JS bundle, so the sideloaded app keeps fetching real
  # TMDB and addon data without any preview-URL dependency on the
  # frontend side.
  REACT_APP_BACKEND_URL: https://rebrand-app-5.preview.emergentagent.com

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn deps
        working-directory: frontend
        run: yarn install --network-timeout 600000

      - name: Build React app (production)
        working-directory: frontend
        env:
          CI: 'false'  # don't fail the build on lint warnings
          GENERATE_SOURCEMAP: 'false'
          DISABLE_ESLINT_PLUGIN: 'true'
        run: |
          yarn build
          echo "=== React build output: ==="
          ls -la build/
          echo "=== JS bundle: ==="
          ls -la build/static/js/ 2>/dev/null | head -5

      - name: Bundle frontend into Android assets
        run: |
          rm -rf android/vesper-tv/app/src/main/assets/web
          mkdir -p android/vesper-tv/app/src/main/assets/web
          cp -r frontend/build/. android/vesper-tv/app/src/main/assets/web/

          # --- Strip Emergent preview / PostHog telemetry from the
          # bundled index.html.  These scripts inject the "You're
          # viewing a static preview — Resume to interact" banner and
          # the "Made with Emergent" badge, both of which show up on
          # the sideloaded APK because the WebView fetches them over
          # the internet.  We want a clean, branded experience inside
          # the box, so we surgically remove them at bundle time.
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('android/vesper-tv/app/src/main/assets/web/index.html')
          html = p.read_text(encoding='utf-8')
          # 1) Remove the emergent-main.js loader script.
          html = re.sub(
              r'<script[^>]*assets\.emergent\.sh[^>]*></script>\s*',
              '', html, flags=re.IGNORECASE)
          # 2) Remove the "Made with Emergent" badge anchor element.
          html = re.sub(
              r'<a\s+id="emergent-badge"[\s\S]*?</a>\s*',
              '', html, flags=re.IGNORECASE)
          # 3) Remove the PostHog telemetry init script block.
          html = re.sub(
              r'<script>\s*!\(function\s*\([^)]*\)\s*\{[\s\S]*?posthog\.init\([\s\S]*?\}\);?\s*</script>\s*',
              '', html, flags=re.IGNORECASE)
          p.write_text(html, encoding='utf-8')
          print('=== index.html cleaned of Emergent / PostHog tracking ===')
          PY

          # --- Wrap each main JS chunk in try/catch so any runtime
          # failure on the box becomes a readable error string in the
          # boot splash diagnostic panel — instead of a CORS-masked
          # "Script error." with no message (the default behaviour
          # for any file:// loaded script on Android WebView).
          python3 - <<'PY'
          import pathlib, re
          js_dir = pathlib.Path('android/vesper-tv/app/src/main/assets/web/static/js')
          if not js_dir.exists():
              print('!! no static/js dir, skipping wrapper')
          else:
              # Wrap every entry/chunk so a runtime error in ANY of
              # them surfaces a readable message instead of the
              # CORS-masked "Script error.".  We skip ones already
              # tagged with /*WRAP*/ to stay idempotent if the
              # workflow ever re-runs against the same artifact.
              for f in sorted(js_dir.glob('*.js')):
                  if f.name.endswith('.LICENSE.txt'):
                      continue
                  body = f.read_text(encoding='utf-8')
                  if body.startswith('/*WRAP*/'):
                      continue
                  wrapped = (
                      "/*WRAP*/try{\n" + body + "\n}catch(e){\n"
                      "try{\n"
                      "  window.__bundleError = e;\n"
                      "  var stack = (e && (e.stack || e.message || String(e))) || 'unknown error';\n"
                      "  var t = document.getElementById('vesper-boot-title');\n"
                      "  var s = document.getElementById('vesper-boot-sub');\n"
                      "  var sp = document.getElementById('vesper-boot-spinner');\n"
                      "  if (t) t.innerHTML = \"ON NOW TV couldn't start\";\n"
                      "  if (s) s.innerHTML = "
                      "    \"<span style='font-size:12px;color:#A8B5C7;'>Real error from the JS bundle:</span><br/><br/>\""
                      "    + \"<pre style='text-align:left;font-size:10px;color:#FCA5A5;background:rgba(255,255,255,0.04);padding:12px;border-radius:8px;max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-all;'>\""
                      "    + (stack + '').replace(/</g,'&lt;')"
                      "    + \"</pre>\";\n"
                      "  if (sp) sp.style.display = 'none';\n"
                      "}catch(_){}\n"
                      "throw e;\n"
                      "}\n"
                  )
                  f.write_text(wrapped, encoding='utf-8')
                  print('wrapped:', f.name, 'size:', f.stat().st_size)
          PY

          echo "=== Bundled into APK assets: ==="
          ls -la android/vesper-tv/app/src/main/assets/web/ | head
          FILES=$(find android/vesper-tv/app/src/main/assets/web/ -type f | wc -l)
          echo "Total files: $FILES"
          # Fail fast if React build silently produced an empty folder
          if [ "$FILES" -lt 5 ]; then
            echo "❌ ERROR: bundled assets folder has fewer than 5 files — React build likely failed!"
            exit 1
          fi
          # Sanity check: index.html must exist and reference assets
          if [ ! -f android/vesper-tv/app/src/main/assets/web/index.html ]; then
            echo "❌ ERROR: index.html missing from bundled assets!"
            exit 1
          fi
          # Sanity check: emergent.sh script must be gone
          if grep -q "assets.emergent.sh" android/vesper-tv/app/src/main/assets/web/index.html; then
            echo "❌ ERROR: emergent script not stripped from index.html"
            exit 1
          fi
          # The id="emergent-badge" anchor element must be gone (we
          # still keep the CSS-selector string in our inline <style>
          # block as a runtime safety net, so we look for the
          # specific `id="emergent-badge"` attribute, not just the
          # bare substring).
          if grep -q 'id="emergent-badge"' android/vesper-tv/app/src/main/assets/web/index.html; then
            echo "❌ ERROR: emergent-badge anchor element not stripped from index.html"
            exit 1
          fi
          echo "=== index.html (sanitized) first 30 lines: ==="
          head -30 android/vesper-tv/app/src/main/assets/web/index.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Generate gradle wrapper + local.properties
        working-directory: android/vesper-tv
        run: |
          # Point local.properties at the Android SDK that
          # setup-android@v3 installed.
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "=== local.properties ==="
          cat local.properties
          # Generate the gradlew wrapper using the Gradle from
          # setup-gradle@v3.
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew
          ./gradlew --version

      - name: Build debug APK
        working-directory: android/vesper-tv
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f
          APK=$(find android -name "*-debug.apk" -type f | head -n1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK file found anywhere under android/"
            find android/vesper-tv/app/build -type d 2>/dev/null | head -20
            exit 1
          fi
          echo "Found APK at: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/onnowtv-v2-debug.apk"
          ls -la "$GITHUB_WORKSPACE/onnowtv-v2-debug.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnowtv-v2-debug.apk
          path: onnowtv-v2-debug.apk
          retention-days: 30

      - name: Publish/update "apk-latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: ON NOW TV V2 — latest debug build
          body: |
            Sideload-ready debug APK auto-built from the latest commit.
            React frontend is bundled inside the APK; backend calls go
            to the deployed TMDB/addons proxy.

            Install on your HK1 box via "Downloader" by AFTVnews — paste
            this release page's APK download URL.
          files: onnowtv-v2-debug.apk
          prerelease: true
          make_latest: 'false'

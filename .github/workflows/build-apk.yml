            - 🚫 **Watch-Together picker now strictly REFUSES 4K
              streams.**  User correctly diagnosed: "I think the
              buffering on the host's side is because we might be
              choosing a 4K stream."  Yes — even though we filtered
              4K out, the picker had a fallback that would let 4K
              through if every other candidate was filtered.  Now:
              if every available stream is 4K, the picker bails and

            **v2.6.84 — Live TV: FAST ZAPPING · "Press OK" host hint · 1-second EPG**
            - ⚡ **Live TV channel zap is now ~3× faster.**
              libVLC `:network-caching` for LIVE streams dropped
              from 1.5 s → 600 ms, `:live-caching` & `:file-caching`
              now explicit at 600 ms, `:clock-jitter=0` for tight
              A/V sync, `:drop-late-frames` + `:skip-frames` so
              network hiccups stall briefly instead of silently
              freezing.
            - 🎬 **Removed the 1.2 s synopsis-pause on Live TV.**
              The cinematic preview card now dismisses the
              MILLISECOND the first frame decodes — no more

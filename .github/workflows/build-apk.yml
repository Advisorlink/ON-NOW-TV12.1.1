name: Build ON NOW TV V2 APK

# Workflow:
#   1. Build the React app with the live REACT_APP_BACKEND_URL baked in
#      (so the bundled APK still talks to the deployed backend for
#      TMDB / Stremio addons).
#   2. Copy the build output into android/vesper-tv/app/src/main/assets/web/
#      so the WebView loads it from file:///android_asset/.
#   3. Build the debug APK.  Publish artifact + auto-update Release.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release

env:
  # Live deployed backend URL — the APK bakes this into the
  # production JS bundle, so the sideloaded app keeps fetching real
  # TMDB and addon data without any preview-URL dependency on the
  # frontend side.
  # v2.6.79: TEMPORARY rollback to the PREVIEW URL while the
  # production deployment at `rebrand-app-5.emergent.host` is
  # returning Cloudflare 520 / nginx 502.  Preview pod is rock-
  # solid so this keeps clients working while we (a) wait for
  # Emergent support to fix prod OR (b) migrate to a Contabo VPS.
  # Will swap to the Contabo domain (vesper.tv / similar) once
  # the VPS is provisioned.
  REACT_APP_BACKEND_URL: http://62.84.181.66

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn deps
        working-directory: frontend
        run: yarn install --network-timeout 600000

      - name: Build React app (production)
        working-directory: frontend
        env:
          CI: 'false'  # don't fail the build on lint warnings
          GENERATE_SOURCEMAP: 'false'
          DISABLE_ESLINT_PLUGIN: 'true'
        run: |
          yarn build
          echo "=== React build output: ==="
          ls -la build/
          echo "=== JS bundle: ==="
          ls -la build/static/js/ 2>/dev/null | head -5

      - name: Bundle frontend into Android assets
        run: |
          rm -rf android/vesper-tv/app/src/main/assets/web
          mkdir -p android/vesper-tv/app/src/main/assets/web
          cp -r frontend/build/. android/vesper-tv/app/src/main/assets/web/

          # --- Strip Emergent preview / PostHog telemetry from the
          # bundled index.html.  These scripts inject the "You're
          # viewing a static preview — Resume to interact" banner and
          # the "Made with Emergent" badge, both of which show up on
          # the sideloaded APK because the WebView fetches them over
          # the internet.  We want a clean, branded experience inside
          # the box, so we surgically remove them at bundle time.
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('android/vesper-tv/app/src/main/assets/web/index.html')
          html = p.read_text(encoding='utf-8')
          # 1) Remove the emergent-main.js loader script.
          html = re.sub(
              r'<script[^>]*assets\.emergent\.sh[^>]*></script>\s*',
              '', html, flags=re.IGNORECASE)
          # 2) Remove the "Made with Emergent" badge anchor element.
          html = re.sub(
              r'<a\s+id="emergent-badge"[\s\S]*?</a>\s*',
              '', html, flags=re.IGNORECASE)
          # 3) Remove the PostHog telemetry init script block.
          html = re.sub(
              r'<script>\s*!\(function\s*\([^)]*\)\s*\{[\s\S]*?posthog\.init\([\s\S]*?\}\);?\s*</script>\s*',
              '', html, flags=re.IGNORECASE)
          p.write_text(html, encoding='utf-8')
          print('=== index.html cleaned of Emergent / PostHog tracking ===')
          PY

          # --- Wrap each main JS chunk in try/catch so any runtime
          # failure on the box becomes a readable error string in the
          # boot splash diagnostic panel — instead of a CORS-masked
          # "Script error." with no message (the default behaviour
          # for any file:// loaded script on Android WebView).
          python3 - <<'PY'
          import pathlib, re
          js_dir = pathlib.Path('android/vesper-tv/app/src/main/assets/web/static/js')
          if not js_dir.exists():
              print('!! no static/js dir, skipping wrapper')
          else:
              # Wrap every entry/chunk so a runtime error in ANY of
              # them surfaces a readable message instead of the
              # CORS-masked "Script error.".  We skip ones already
              # tagged with /*WRAP*/ to stay idempotent if the
              # workflow ever re-runs against the same artifact.
              for f in sorted(js_dir.glob('*.js')):
                  if f.name.endswith('.LICENSE.txt'):
                      continue
                  body = f.read_text(encoding='utf-8')
                  if body.startswith('/*WRAP*/'):
                      continue
                  wrapped = (
                      "/*WRAP*/try{\n" + body + "\n}catch(e){\n"
                      "try{\n"
                      "  window.__bundleError = e;\n"
                      "  var stack = (e && (e.stack || e.message || String(e))) || 'unknown error';\n"
                      "  var t = document.getElementById('vesper-boot-title');\n"
                      "  var s = document.getElementById('vesper-boot-sub');\n"
                      "  var sp = document.getElementById('vesper-boot-spinner');\n"
                      "  if (t) t.innerHTML = \"ON NOW TV couldn't start\";\n"
                      "  if (s) s.innerHTML = "
                      "    \"<span style='font-size:12px;color:#A8B5C7;'>Real error from the JS bundle:</span><br/><br/>\""
                      "    + \"<pre style='text-align:left;font-size:10px;color:#FCA5A5;background:rgba(255,255,255,0.04);padding:12px;border-radius:8px;max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-all;'>\""
                      "    + (stack + '').replace(/</g,'&lt;')"
                      "    + \"</pre>\";\n"
                      "  if (sp) sp.style.display = 'none';\n"
                      "}catch(_){}\n"
                      "throw e;\n"
                      "}\n"
                  )
                  f.write_text(wrapped, encoding='utf-8')
                  print('wrapped:', f.name, 'size:', f.stat().st_size)
          PY

          echo "=== Bundled into APK assets: ==="
          ls -la android/vesper-tv/app/src/main/assets/web/ | head
          FILES=$(find android/vesper-tv/app/src/main/assets/web/ -type f | wc -l)
          echo "Total files: $FILES"
          # Fail fast if React build silently produced an empty folder
          if [ "$FILES" -lt 5 ]; then
            echo "❌ ERROR: bundled assets folder has fewer than 5 files — React build likely failed!"
            exit 1
          fi
          # Sanity check: index.html must exist and reference assets
          if [ ! -f android/vesper-tv/app/src/main/assets/web/index.html ]; then
            echo "❌ ERROR: index.html missing from bundled assets!"
            exit 1
          fi
          # Sanity check: emergent.sh script must be gone
          if grep -q "assets.emergent.sh" android/vesper-tv/app/src/main/assets/web/index.html; then
            echo "❌ ERROR: emergent script not stripped from index.html"
            exit 1
          fi
          # The id="emergent-badge" anchor element must be gone (we
          # still keep the CSS-selector string in our inline <style>
          # block as a runtime safety net, so we look for the
          # specific `id="emergent-badge"` attribute, not just the
          # bare substring).
          if grep -q 'id="emergent-badge"' android/vesper-tv/app/src/main/assets/web/index.html; then
            echo "❌ ERROR: emergent-badge anchor element not stripped from index.html"
            exit 1
          fi
          echo "=== index.html (sanitized) first 30 lines: ==="
          head -30 android/vesper-tv/app/src/main/assets/web/index.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Generate gradle wrapper + local.properties
        working-directory: android/vesper-tv
        run: |
          # Point local.properties at the Android SDK that
          # setup-android@v3 installed.
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "=== local.properties ==="
          cat local.properties
          # Generate the gradlew wrapper using the Gradle from
          # setup-gradle@v3.
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew
          ./gradlew --version

      - name: Build debug APK
        working-directory: android/vesper-tv
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate APK
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f
          APK=$(find android -name "*-debug.apk" -type f | head -n1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK file found anywhere under android/"
            find android/vesper-tv/app/build -type d 2>/dev/null | head -20
            exit 1
          fi
          echo "Found APK at: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/onnowtv-v2-debug.apk"
          ls -la "$GITHUB_WORKSPACE/onnowtv-v2-debug.apk"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: onnowtv-v2-debug.apk
          path: onnowtv-v2-debug.apk
          retention-days: 30

      - name: Publish/update "apk-latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: ON NOW TV V2 — latest debug build
          body: |
            Sideload-ready debug APK auto-built from the latest commit.
            React frontend is bundled inside the APK; backend calls go
            to the deployed TMDB/addons proxy.

            **v2.6.80 — PERMANENT BACKEND on Contabo VPS (own infrastructure)**
            - 🚀 **`REACT_APP_BACKEND_URL` now points at our own VPS:
              `http://62.84.181.66`**.  No more dependence on the
              Emergent preview pod (which kept hibernating) or the
              broken production deployment (which was returning
              520/502).  This is dedicated, always-on infrastructure
              we control 100%.
            - 📦 What's running on the VPS: Ubuntu 24.04 LTS, MongoDB 7,
              nginx 1.24 reverse proxy, FastAPI/uvicorn (systemd
              service `onnowtv-backend.service`, auto-restart on
              crash), yt-dlp + ffmpeg for trailer extraction, ufw
              firewall locked down to 22/80/443.
            - 🔒 **Cleartext-HTTP exception** added to
              `network_security_config.xml` for `62.84.181.66`
              specifically — required because Android API 28+ blocks
              non-TLS by default.  Will be removed once we move to
              a DDNS hostname with a Let's Encrypt cert (e.g.
              `onnowtv.duckdns.org` once DNS propagation works).
            - 🆙 APK bumped to **v2.6.80** (versionCode 150).

            **v2.6.79 — EMERGENCY rollback to preview URL · prod is 520-ing**
            - 🚑 **`REACT_APP_BACKEND_URL` rolled BACK to
              `https://rebrand-app-5.preview.emergentagent.com`.**
              The Emergent production deployment at
              `rebrand-app-5.emergent.host` is returning Cloudflare
              520 + nginx 502 on every API endpoint — every API
              call fails so catalogues / Live TV / profiles show
              empty.  Preview pod is rock-solid; clients on this
              build will work while Emergent support fixes prod
              OR while we migrate to the Contabo VPS.
            - 🆙 APK bumped to **v2.6.79** (versionCode 149).

            **v2.6.78 — End-user polish: "currently offline" + Sources hidden**
            - 📡 **"Install a Stremio addon to see real catalogues" →
              "On Now TV is currently offline."**  Friendlier copy
              when the empty-catalogue state shows (e.g. on a fresh
              install before addons have synced).  Now also includes
              a soft hint: "Check your internet connection and try
              again — your profile and library are saved."  Removed
              the "Open Sources →" button entirely.
            - 🛏 **Sources entry hidden from the main nav.**  End
              users should never need to configure addons — that's
              an internal-only workflow now.  The `/sources` route
              still exists for direct-URL access but it no longer
              clutters the SideNav for normal users.
            - 🆙 APK bumped to **v2.6.78** (versionCode 148).

            **v2.6.77 — Host menu + popcorn artwork ACTUALLY render (ref → state)**
            - 🐛 **The bug**: in `Player.jsx`, `isPartyHost` was
              derived from `partyRoleRef.current` — a REF.  React
              doesn't re-render when a ref's `.current` changes,
              so after the WS resolved the role the derived flag
              stayed at `false`.  Net effect: the 5-button menu
              never mounted, and the popcorn artwork stayed as
              the (default 'guest') popcorn instead of switching
              to `host-loading.png` for hosts.
            - ✅ **Fix**: also keep `partyRoleState` (state) in
              parallel with the ref.  Every `isPartyHost` /
              `isPartyGuest` derivation now reads from state →
              React re-renders → both the host menu AND the host
              loading artwork appear as designed.
            - Also cleaned up an orphan JSX block from the v2.6.74
              edit that was leftover after the old preview ribbon
              was replaced.
            - 🆙 APK bumped to **v2.6.77** (versionCode 147).

            **v2.6.76 — STRICT no-4K in Watch Together (host buffering fix)**
            - 🚫 **Watch-Together picker now strictly REFUSES 4K
              streams.**  User correctly diagnosed: "I think the
              buffering on the host's side is because we might be
              choosing a 4K stream."  Yes — even though we filtered
              4K out, the picker had a fallback that would let 4K
              through if every other candidate was filtered.  Now:
              if every available stream is 4K, the picker bails and
              broadcasts `stream_error: only_4k_available` so guests
              see a clean error instead of a buffer storm.
            - 🔍 **`is4K()` detection beefed up.**  Now matches:
              `4kbluray`, `4kuhd`, `2160i` (previously only `2160p`),
              and a HEVC + ≥ 10 Mbps bitrate heuristic for Plex
              direct streams that don't tag the title as 4K.
              12 unit tests added to lock this behaviour in place.
            - 🆙 APK bumped to **v2.6.76** (versionCode 146).

            **v2.6.75 — Host menu in web player · Top 5 movie picks**
            - 🎛 **HOST 5-button menu now in the WEB player.**  Port
              of the native Kotlin party menu so hosts on phones
              and the web preview see the SAME controls as on the
              HK1 box: Pause · Skip +30s · Catch Up · Lock · Subs.
              Click video → menu appears.  Auto-hides 6 s.  Locked
              state freezes the player surface until Hold-OK-2s
              unlocks.  Legacy `PlayerOverlay` (Subtitles / Audio /
              Speed / Aspect strip) is now hidden whenever a party
              code is in the URL, so the host never sees the wrong
              control bar.
            - 🎬 **"What do you want to watch?" Top-5 movie row.**
              New `/api/tmdb/party-picks` endpoint returns the
              latest theatrical releases filtered to `vote_average
              >= 6.0` AND `vote_count >= 40`.  Top 5 are rendered
              as poster cards on the host's pick stage UNDER the
              search box.  Keyboard is hidden by default — only
              appears when the user clicks the search input.  Click
              a poster → party launches with that movie, zero
              typing required.
            - 🆙 APK bumped to **v2.6.75** (versionCode 145).

            **v2.6.74 — Unified popcorn artwork · WS auto-reconnect · 200 ms emoji rate**
            - 🎬 **No more loading screen between popcorn and play.**
              The host's loading PNG and the guest's popcorn JPG now
              stay on-screen ALL THE WAY through to the moment
              playback starts.  Replaced the legacy
              `PartyStartingScreen` (the poster-blurred "Loading…
              100%" view) with a full-bleed image identical in style
              to `PartyJoiningScreen`.  Top-right party-code chip is
              the only overlay.  Result: one continuous cinematic
              transition into the movie, no UI flash.
            - 🔁 **Watch-Together WebSocket auto-reconnects.**  User
              reported: "After sending multiple emojis, it stops
              sending them completely and restarts the stream."
              Confirmed cause: WS dropped (badge flipped to OFFLINE)
              and never came back.  Now: on `onclose` the client
              schedules a reconnect with 1.5 s / 3 s / 5 s / 8 s
              backoff and resends `hello` + the `ready` flag on
              re-open.  Status badge flips to "RECONNECTING" while
              we're between sockets.
            - 😱 **Rapid-fire emojis now actually fire.**  Backend
              per-member rate-limit was 800 ms which silently dropped
              3-4 out of 5 fast taps.  Dropped to 200 ms — still
              prevents a stuck-key spam attack, but real rapid taps
              all land on every party member's screen.
            - 🆙 APK bumped to **v2.6.74** (versionCode 144).

            **v2.6.73 — APK now points at PRODUCTION (no more preview banner!)**
            - 🚀 **`REACT_APP_BACKEND_URL` swapped to
              `https://rebrand-app-5.emergent.host`.**  User confirmed
              the production deployment is now healthy (was returning
              Cloudflare 520 in earlier checks).  Clients hitting the
              app will now get the real production backend every
              time — no more "Resume Preview" banner injected by the
              preview-pod hibernation middleware.
            - 🆙 APK bumped to **v2.6.73** (versionCode 143).
            - Defensive client-side banner nuker from v2.6.72 stays in
              place as a belt-and-braces safety net.

            **v2.6.72 — DEFENSIVE: nuke "Resume Preview" banner client-side**
            - 🛡️ **Aggressive MutationObserver-based banner nuker.**
              The "You're viewing a static preview · Resume Preview"
              bar is injected by Emergent's preview-pod hibernation
              middleware (not our code).  Real fix is migrating to a
              production URL (`*.emergent.host` instead of
              `*.preview.emergentagent.com`) — the user is in touch
              with Emergent support for this.
              In the meantime this build adds:
              • Broader CSS selectors covering `[class*="resume-preview"]`,
                `[aria-label*="Resume Preview"]`, `button[class*="resume"]`,
                `[data-preview-banner]`, etc.
              • A MutationObserver that detects nodes containing the
                strings "Resume Preview" or "viewing a static preview"
                and removes them within a single frame.
              • Initial DOMContentLoaded sweep so any banner injected
                before the observer is wired up still gets cleaned.
              Net effect: even if the preview pod hibernates and the
              platform tries to overlay the banner, the user sees it
              for ≤ 1 frame before our observer removes it.
            - 🆙 APK bumped to **v2.6.72** (versionCode 142).

            **v2.6.71 — Host button error · No-border avatar reactions · Backup button on update**
            - 📣 **Host party button errors are now visible.**  The
              "host party isn't clickable" was actually a silent
              fetch failure (8-second timeout + network errors not
              shown).  Now: 8-second timeout, sonner error toast with
              the failure reason so you know to retry.
            - 🦊 **Reactions redesigned: NO BORDERS, avatar dock.**
              Each party member's avatar emoji (🦁/🦊/🛸…) is parked
              side-by-side in the bottom-right.  When they tap a
              D-pad direction, the emoji emerges UPWARD from THEIR
              avatar with no chrome — pure floating emoji.  Their
              avatar also pulses (1.25x) so you instantly know who
              reacted.  Avatars persist for the whole session,
              never go away.
            - 💾 **"Back up first" button on the update popup.**
              User feedback: "We need to add a backup accounts
              button on the update pop up — don't want people
              losing all their stuff."  New cyan-outlined "BACK UP
              FIRST" pill next to "Download" / "Skip"; clicking it
              dismisses the gate and jumps you straight to
              Settings → Backup & Restore with the panel
              auto-focused.
            - 🆙 APK bumped to **v2.6.71** (versionCode 141).

            **v2.6.70 — Rapid-fire single-press emojis · Cinematic Live Guide**
            - 👆 **EMOJI REACTIONS = SINGLE PRESS!**  Now that the
              host LOCK SCREEN + guest VIEW-ONLY mode means stray
              D-pad presses can't affect playback, the 2-second long-
              press is gone.  Tap UP / DOWN / LEFT / RIGHT once →
              instant emoji.  250 ms cooldown between fires means
              rapid-fire spam is fully supported when something's
              hilarious.
            - 📺 **LIVE GUIDE REDESIGNED** to match your reference:
              • **Full-screen backdrop** of the focused channel's
                art fills the frame, dimmed so foreground reads
                cleanly (was a tiny image inside the card).
              • **Detail card is now BIGGER + center-right** (540dp,
                vertically centered) instead of a small bottom-right
                widget.  LinearLayout structure so the header,
                metadata chips, time slot, synopsis and "UP NEXT"
                stack cleanly instead of overlapping.
              • **"◀ BACK · PRESS BACK TO RETURN TO PLAYER"** chip
                in the bottom-right so you always know how to get
                out of the guide.
            - 🆙 APK bumped to **v2.6.70** (versionCode 140).

            **v2.6.69 — Host menu · Avatar reactions · Popcorn image fix**
            - 🍿 **POPCORN LOADING IMAGE NOW LOADS** on the sideloaded
              APK.  Previously the guest joining screen showed a
              broken-image icon because `<img src="/party/popcorn-loading.jpg">`
              resolves to the device filesystem root under
              `file:///android_asset/web/index.html`.  Switched to
              `Host.publicAsset('party/popcorn-loading.jpg')` which
              resolves relative to `document.baseURI`.  Same fix
              applied to the no-mouse onboarding remote image.
            - 🎛 **HOST PARTY MENU.**  OK press while in a party
              brings up a focused 5-button bar:
              **⏸  PAUSE   ⏩  SKIP +30s   ⟳  CATCH UP   🔒  LOCK   💬  SUBS**
              D-pad LEFT/RIGHT to navigate, OK to select.  The
              legacy controls strip is **never** shown for the host
              in party mode → the stray UP arrow that "restarted
              the stream" can't happen again.
              • **PAUSE / RESUME** — pauses/resumes the party for
                EVERYONE via the existing `pause`/`resume` WS.
              • **SKIP +30s** — host scrubs +30s and broadcasts a
                `play{position_ms}` so every guest seeks with them.
              • **CATCH UP** — re-broadcasts the host's exact
                current position.  Toast: "Re-syncing party…".
              • **LOCK** — disables ALL keys except long-press OK
                (2 s) for unlock and long-press D-pad arrows for
                emoji reactions.  The host can now enjoy the show
                without accidental scrubs / pauses.
              • **SUBS** — opens the existing subtitle picker.
              Menu auto-hides after 6 s of inactivity.
            - 😱 **REACTIONS NOW SHOW AVATARS ON EVERY SCREEN.**
              Previously only the sender's screen rendered the
              emoji, and there was no attribution.  Now: each
              member's player launches with their profile's avatar
              emoji baked into the intent; when they fire a
              reaction, their avatar bubble flies up alongside the
              emoji on EVERY party member's screen.  Backend
              `reaction` broadcast now carries `avatar_emoji`.
            - 🆙 APK bumped to **v2.6.69** (versionCode 139).

            **v2.6.68 — GUEST view-only player · Popcorn cinematic loading screen**
            - 🎟️ **Guest player is now VIEW-ONLY.**  Reported issue:
              "If you're trying to push and hold an arrow to send an
              emoji, focus chases all the different parts of the
              player."  Fix in `VlcPlayerActivity.kt`:
              • Guests can NO LONGER pause, seek, rewind, fast-fwd,
                use channel keys, or open the player controls strip.
              • The control strip itself never even mounts for the
                guest — `showControls()` is a no-op when partyRole
                is guest, so focus has nowhere to wander.
              • All D-pad arrow presses are consumed silently → no
                more focus chasing during long-press emoji reactions.
              • Allowed actions: BACK (leave party), OK (open
                subtitles picker only — tap screen also opens it),
                D-pad arrow long-press (emoji reactions still work).
            - 🍿 **Brand-new GUEST loading screen — your popcorn art!**
              Replaced the standard joining UI for GUESTS with your
              hand-designed "Get your POPCORN ready, your WATCH
              PARTY is about to begin!" artwork.  Full-bleed image,
              subtle "WAITING FOR HOST" chip pulsing at the bottom,
              "Leave" button bottom-right.  Hosts still see the
              poster-blurred loading screen so they can monitor
              stream resolution progress.
            - 🆙 APK bumped to **v2.6.68** (versionCode 138).

            **v2.6.67 — Watch Together CLOCK-SYNC (sub-100 ms sync) · Trailer 720p smooth · Preview banner killed**
            - 🕐 **Watch Together clock-sync via NTP-style ping/pong.**
              Last fix narrowed drift detection but didn't address
              the *cause* — the host's box and the guest's device
              each have independent NTP-synced clocks that can
              easily differ by 200 ms-1 s, silently producing a
              permanent playback lag the drift detector couldn't
              see (the guest correctly converged to its *skewed*
              target).  Now on WS connect each member bursts 5
              pings 200 ms apart to measure its local-clock-to-
              server offset (Cristian's algorithm, lowest-RTT
              sample wins).  All timing math — drift projection,
              countdown firing — uses the offset.  Host and guest
              now fire `mediaPlayer.play()` at the SAME server-
              wallclock instant, and ongoing drift is measured
              against the same reference.  Expected sync: ±100 ms.
            - 🎞 **Trailers now smooth on the HK1 box.**  Capped the
              extracted format at 720p (was 1080p) — frees decoder
              headroom for the input-slave audio merge.  Plus
              libVLC tuning for the trailer pipeline: 3.5 s network
              cache, strict clock-jitter, hardware decode hint,
              avcodec thread cap, drop-late-frames + skip-frames so
              network blips drop a frame instead of stalling the
              whole pipeline.
            - 📺 **"Redo your preview" banner banished from the APK.**

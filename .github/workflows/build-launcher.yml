name: Build ON NOW TV V2 Launcher APK

# Builds the new native Android TV launcher
# (/app/android/onnowtv-launcher/) and publishes the APK as a
# GitHub Release under the tag `launcher-latest`.  Runs only when
# files inside the launcher project change so the existing
# `build-apk.yml` workflow stays untouched.

on:
  push:
    branches: ["**"]
    paths:
      - 'android/onnowtv-launcher/**'
      - '.github/workflows/build-launcher.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle 8.7 distribution
        uses: actions/cache@v4
        with:
          path: ~/gradle-8.7
          key: gradle-dist-8.7-v1

      - name: Install Gradle 8.7 (with retries)
        shell: bash
        run: |
          # v2.10.6 — Replaced gradle/actions/setup-gradle@v3 which
          # has been hitting "Unexpected HTTP response: 504" with
          # no retry knob.
          set -euo pipefail
          GRADLE_DIR="$HOME/gradle-8.7"
          if [ ! -x "$GRADLE_DIR/bin/gradle" ]; then
            cd "$HOME"
            curl -fL --retry 6 --retry-delay 10 --retry-all-errors \
              -o gradle.zip \
              "https://services.gradle.org/distributions/gradle-8.7-bin.zip"
            unzip -q gradle.zip
            rm gradle.zip
          fi
          echo "$GRADLE_DIR/bin" >> "$GITHUB_PATH"
          "$GRADLE_DIR/bin/gradle" --version

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          cmdline-tools-version: 12266719
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Generate gradle wrapper + local.properties
        working-directory: android/onnowtv-launcher
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew
          ./gradlew --version

      - name: Derive versionCode
        id: ver
        run: |
          # versionCode = 1 + monotonically-increasing CI run number,
          # which guarantees a strictly higher integer on every push.
          VCODE=$(( 1 + GITHUB_RUN_NUMBER ))
          VNAME="0.1.$VCODE"
          echo "Detected versionName=$VNAME versionCode=$VCODE"
          echo "vname=$VNAME" >> "$GITHUB_OUTPUT"
          echo "vcode=$VCODE" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        working-directory: android/onnowtv-launcher
        run: ./gradlew assembleDebug --no-daemon --stacktrace -PversionName=${{ steps.ver.outputs.vname }} -PversionCode=${{ steps.ver.outputs.vcode }}

      - name: Locate APK
        run: |
          echo "=== Searching for APK files ==="
          find android/onnowtv-launcher -name "*.apk" -type f
          APK=$(find android/onnowtv-launcher -name "*-debug.apk" -type f | head -n1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK file found"
            exit 1
          fi
          echo "Found APK at: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/onnowtv-launcher-debug.apk"
          ls -la "$GITHUB_WORKSPACE/onnowtv-launcher-debug.apk"

      # v2.8.6 — Pre-delete the previous launcher APK asset with
       # retries before letting softprops re-upload, to avoid the
      # intermittent "Server Error" 5xx from the action's built-in
      # delete-then-upload path on large APK assets.  Same pattern
      # as the Vesper build-apk workflow.
      - name: Delete previous launcher-latest asset (with retries)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ASSET="onnowtv-launcher-debug.apk"
          TAG="launcher-latest"
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $TAG does not exist yet — skipping pre-delete."
              exit 0
          fi
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
                  --json assets --jq '.assets[].name' | grep -qx "$ASSET"; then
              echo "Asset $ASSET not present on $TAG — skipping pre-delete."
              exit 0
          fi
          for attempt in 1 2 3 4 5; do
              echo "Attempt $attempt: deleting $ASSET from release $TAG…"
              if gh release delete-asset "$TAG" "$ASSET" \
                      --repo "$GITHUB_REPOSITORY" --yes; then
                  echo "Deleted previous $ASSET successfully."
                  exit 0
              fi
              if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
                      --json assets --jq '.assets[].name' | grep -qx "$ASSET"; then
                  echo "Asset already gone after attempt $attempt — done."
                  exit 0
              fi
              sleep $((attempt * 4))
          done
          echo "WARNING: could not pre-delete $ASSET after 5 attempts — softprops will try its own delete."
          exit 0

      - name: Publish/update launcher-latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: launcher-latest
          name: ON NOW TV V2 Launcher — v${{ steps.ver.outputs.vname }}
          body: |
            Native Android TV launcher — replaces the system home screen.

            **Install:**
            1. Download the APK below.
            2. Sideload it onto your Android TV box (e.g. via `adb install` or a file-explorer app).
            3. Open Settings → Apps → Default apps → Home → select **OnNow TV V2**.

            The first build is a UI-only scaffold matching the design reference; backend-driven icons / wallpapers / APK manifest / popup notifications are wired in subsequent releases.
          files: onnowtv-launcher-debug.apk
          prerelease: true
          make_latest: 'false'

name: Bootstrap stable debug keystore

# Run this workflow ONCE via the "Run workflow" button on the Actions
# tab to generate a stable debug keystore and commit it to the repo.
# From then on every build in build-apk.yml will sign with that same
# keystore, so users can upgrade between APK versions without the
# "the application can't be installed because it conflicts with the
# existing one" Android error (which is caused by signing-cert
# mismatch between builds).
#
# Idempotent: re-running is a no-op if the keystore already exists.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore (skip if already exists)
        run: |
          KS=android/vesper-tv/app/onnowtv-stable-debug.keystore
          if [ -f "$KS" ]; then
            echo "Keystore already exists at $KS — nothing to do."
            exit 0
          fi
          mkdir -p android/vesper-tv/app
          keytool \
            -genkeypair \
            -v \
            -keystore "$KS" \
            -storetype PKCS12 \
            -storepass onnowtv-debug \
            -keypass   onnowtv-debug \
            -alias onnowtv-debug \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -dname "CN=ON NOW TV Debug, OU=Vesper, O=ON NOW TV, L=Brisbane, S=QLD, C=AU"
          echo ""
          echo "=== Keystore info ==="
          keytool -list -v -keystore "$KS" -storepass onnowtv-debug | head -20

      - name: Commit keystore
        run: |
          if git diff --quiet --exit-code -- android/vesper-tv/app/onnowtv-stable-debug.keystore; then
            echo "No keystore change — exiting."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/vesper-tv/app/onnowtv-stable-debug.keystore
          git commit -m "ci: bootstrap stable debug keystore for upgrade-safe APK builds"
          git push

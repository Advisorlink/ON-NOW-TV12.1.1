name: Bootstrap launcher stable debug keystore

# v2.8.4 — Sister workflow to bootstrap-keystore.yml (which creates
# Vesper's stable signing cert).  Run ONCE via the "Run workflow"
# button on the Actions tab to generate the launcher's stable debug
# keystore and commit it to the repo.  From then on every build in
# build-launcher.yml will sign with that same keystore, so users can
# UPGRADE between APK versions without the "this app's signature
# does not match the existing one" / "not installed" Android error.
#
# Idempotent: re-running is a no-op if the keystore already exists.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate keystore (skip if already exists)
        run: |
          KS=android/onnowtv-launcher/app/onnow-launcher-debug.keystore
          if [ -f "$KS" ]; then
            echo "Keystore already exists at $KS — nothing to do."
            exit 0
          fi
          mkdir -p android/onnowtv-launcher/app
          keytool \
            -genkeypair \
            -v \
            -keystore "$KS" \
            -storetype PKCS12 \
            -storepass onnow-launcher-debug \
            -keypass   onnow-launcher-debug \
            -alias onnow-launcher-debug \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -dname "CN=ON NOW TV Launcher Debug, OU=Launcher, O=ON NOW TV, L=Brisbane, S=QLD, C=AU"
          echo ""
          echo "=== Keystore info ==="
          keytool -list -v -keystore "$KS" -storepass onnow-launcher-debug | head -20

      - name: Commit keystore
        run: |
          if git diff --quiet HEAD -- android/onnowtv-launcher/app/onnow-launcher-debug.keystore; then
            echo "No changes to commit — keystore already in repo."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add android/onnowtv-launcher/app/onnow-launcher-debug.keystore
          git commit -m "Bootstrap stable launcher debug keystore for upgrade-safe APKs"
          git push

name: Build ON NOW TV Tunes APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/onnowtv-tunes/**'
      - 'frontend/**'
      - 'CHANGELOG.md'
      - '.github/workflows/build-tunes.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  # v2.8.70 — REACT_APP_BACKEND_URL baked into the bundled JS.  The
  # APK now ships the React app offline (file:///android_asset/web/)
  # and only the API calls (/api/...) reach out to the live VPS.
  REACT_APP_BACKEND_URL: https://onnowtv.duckdns.org

jobs:
  build:
    name: Build & sign Tunes APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn deps
        working-directory: frontend
        run: yarn install --network-timeout 600000

      - name: Build React app (production)
        working-directory: frontend
        env:
          CI: 'false'
          GENERATE_SOURCEMAP: 'false'
          DISABLE_ESLINT_PLUGIN: 'true'
        run: |
          yarn build
          ls -la build/

      - name: Bundle React build into Tunes Android assets
        run: |
          set -euo pipefail
          rm -rf android/onnowtv-tunes/app/src/main/assets/web
          mkdir -p android/onnowtv-tunes/app/src/main/assets/web
          cp -r frontend/build/. android/onnowtv-tunes/app/src/main/assets/web/

          # Strip Emergent preview / PostHog telemetry from the
          # bundled index.html — same as the Vesper build does.
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('android/onnowtv-tunes/app/src/main/assets/web/index.html')
          html = p.read_text(encoding='utf-8')
          html = re.sub(
              r'<script[^>]*assets\.emergent\.sh[^>]*></script>\s*',
              '', html, flags=re.IGNORECASE)
          html = re.sub(
              r'<a\s+id="emergent-badge"[\s\S]*?</a>\s*',
              '', html, flags=re.IGNORECASE)
          html = re.sub(
              r'<script>\s*!\(function\s*\([^)]*\)\s*\{[\s\S]*?posthog\.init\([\s\S]*?\}\);?\s*</script>\s*',
              '', html, flags=re.IGNORECASE)
          p.write_text(html, encoding='utf-8')
          print('=== index.html cleaned ===')
          PY

          # --- v2.8.71 — Rewrite absolute asset paths to relative
          # so they resolve when the WebView loads from
          # `file:///android_asset/web/index.html`.  See the matching
          # block in `build-apk.yml` for the full explanation; same
          # root cause, same fix.
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('android/onnowtv-tunes/app/src/main/assets/web/index.html')
          html = p.read_text(encoding='utf-8')
          before = html.count('="/')
          html = re.sub(
              r'(\b(?:src|href|content)=)"/(?!/)([^"\s]*)"',
              r'\1"./\2"',
              html,
          )
          after = html.count('="/')
          p.write_text(html, encoding='utf-8')
          print(f'=== index.html absolute->relative paths: {before} → {after} ===')
          PY

          FILES=$(find android/onnowtv-tunes/app/src/main/assets/web/ -type f | wc -l)
          echo "Total bundled files: $FILES"
          if [ "$FILES" -lt 5 ]; then
            echo "❌ Tunes assets folder has <5 files — React build likely failed!"
            exit 1
          fi
          if [ ! -f android/onnowtv-tunes/app/src/main/assets/web/index.html ]; then
            echo "❌ index.html missing from Tunes bundled assets!"
            exit 1
          fi

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Derive versionCode + versionName
        id: version
        shell: bash
        run: |
          set -euo pipefail
          # versionCode = 1 + commit count touching android/onnowtv-tunes/
          VC=$(( 1 + $(git rev-list --count HEAD -- android/onnowtv-tunes/ || echo 0) ))
          # versionName = first ## v2.8.x heading in CHANGELOG.md, else 1.0.0
          VN=$(grep -m1 -E '^## v[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | sed -E 's/^## v([0-9]+\.[0-9]+\.[0-9]+).*/\1/' || true)
          [ -z "$VN" ] && VN="1.0.0"
          echo "VC=$VC" >> $GITHUB_OUTPUT
          echo "VN=$VN" >> $GITHUB_OUTPUT
          echo "versionCode=$VC versionName=$VN"

      - name: Set up keystore (reuse launcher's, same dev signing chain)
        env:
          KEYSTORE_BASE64: ${{ secrets.LAUNCHER_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.LAUNCHER_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.LAUNCHER_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.LAUNCHER_KEY_PASSWORD }}
        shell: bash
        run: |
          ANDROID_KS_DIR="${RUNNER_TEMP}/ks"
          mkdir -p "$ANDROID_KS_DIR"
          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$ANDROID_KS_DIR/release.jks"
            echo "RELEASE_STORE_FILE=$ANDROID_KS_DIR/release.jks"      >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD"           >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS"                        >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD"                  >> $GITHUB_ENV
          else
            echo "No release keystore — debug APK will still build."
          fi

      - name: Bootstrap gradle wrapper (no wrapper jar in repo)
        working-directory: android/onnowtv-tunes
        run: |
          set -euo pipefail
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7 || true
          fi
          chmod +x ./gradlew || true

      - name: Build debug + release APKs
        working-directory: android/onnowtv-tunes
        env:
          VERSION_CODE: ${{ steps.version.outputs.VC }}
          VERSION_NAME: ${{ steps.version.outputs.VN }}
        run: |
          set -euo pipefail
          ./gradlew :app:assembleDebug :app:assembleRelease \
            -PversionCode=$VERSION_CODE \
            -PversionName=$VERSION_NAME \
            --no-daemon \
            --warning-mode summary

      - name: Locate + rename APKs (debug always, release if present)
        shell: bash
        run: |
          set -euo pipefail
          echo "=== all APKs produced ==="
          find android/onnowtv-tunes/app/build/outputs/apk -name "*.apk" -type f -ls || true

          DBG=$(find android/onnowtv-tunes/app/build/outputs/apk -name "*-debug.apk" -type f | head -n1)
          if [ -z "$DBG" ]; then
            echo "::error::No debug APK produced"
            exit 1
          fi
          cp "$DBG" "$GITHUB_WORKSPACE/onnowtv-tunes-debug.apk"
          echo "DEBUG APK: $(ls -la $GITHUB_WORKSPACE/onnowtv-tunes-debug.apk)"

          REL=$(find android/onnowtv-tunes/app/build/outputs/apk -name "*-release.apk" -type f | head -n1)
          if [ -z "$REL" ]; then
            REL=$(find android/onnowtv-tunes/app/build/outputs/apk -name "*-release-unsigned.apk" -type f | head -n1)
          fi
          if [ -n "$REL" ]; then
            cp "$REL" "$GITHUB_WORKSPACE/onnowtv-tunes-release.apk"
            echo "RELEASE APK: $(ls -la $GITHUB_WORKSPACE/onnowtv-tunes-release.apk)"
          else
            echo "No release APK produced — only debug will be published."
          fi

      - name: Publish to GitHub Releases (tunes-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: tunes-latest
          name: "ON NOW TV Tunes ${{ steps.version.outputs.VN }} (build ${{ steps.version.outputs.VC }})"
          body: |
            **ON NOW TV Tunes — standalone music app.**

            Install:
            1. Download `onnowtv-tunes-debug.apk` (or `-release.apk`) below.
            2. Sideload onto your HK1 box via `adb install` or a file-explorer app.
            3. Launch — the app loads the music UI directly in a WebView wrapper
               with the native NewPipeExtractor bridge for full-length tracks.
          files: |
            onnowtv-tunes-debug.apk
            onnowtv-tunes-release.apk
          fail_on_unmatched_files: false
          prerelease: true
          make_latest: 'false'

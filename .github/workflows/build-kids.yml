name: Build ON NOW V2 Kids APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & sign Kids APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Derive versionCode + versionName
        id: version
        shell: bash
        run: |
          set -euo pipefail
          # versionCode = 1 + commit count touching android/onnowtv-kids/
          VC=$(( 1 + $(git rev-list --count HEAD -- android/onnowtv-kids/ || echo 0) ))
          # versionName = first ## v2.8.x heading in CHANGELOG.md, else 1.0.0
          VN=$(grep -m1 -E '^## v[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | sed -E 's/^## v([0-9]+\.[0-9]+\.[0-9]+).*/\1/' || true)
          [ -z "$VN" ] && VN="1.0.0"
          echo "VC=$VC" >> $GITHUB_OUTPUT
          echo "VN=$VN" >> $GITHUB_OUTPUT
          echo "versionCode=$VC versionName=$VN"

      - name: Set up keystore (reuse launcher's, same dev signing chain)
        env:
          KEYSTORE_BASE64: ${{ secrets.LAUNCHER_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.LAUNCHER_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.LAUNCHER_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.LAUNCHER_KEY_PASSWORD }}
        shell: bash
        run: |
          ANDROID_KS_DIR="${RUNNER_TEMP}/ks"
          mkdir -p "$ANDROID_KS_DIR"
          if [ -n "${KEYSTORE_BASE64:-}" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$ANDROID_KS_DIR/release.jks"
            echo "RELEASE_STORE_FILE=$ANDROID_KS_DIR/release.jks"      >> $GITHUB_ENV
            echo "RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD"           >> $GITHUB_ENV
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS"                        >> $GITHUB_ENV
            echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD"                  >> $GITHUB_ENV
          else
            echo "No release keystore — debug APK will still build."
          fi

      - name: Bootstrap gradle wrapper (no wrapper jar in repo)
        working-directory: android/onnowtv-kids
        run: |
          set -euo pipefail
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7 || true
          fi
          chmod +x ./gradlew || true

      - name: Build debug + release APKs
        working-directory: android/onnowtv-kids
        env:
          VERSION_CODE: ${{ steps.version.outputs.VC }}
          VERSION_NAME: ${{ steps.version.outputs.VN }}
        run: |
          set -euo pipefail
          ./gradlew :app:assembleDebug :app:assembleRelease \
            -PversionCode=$VERSION_CODE \
            -PversionName=$VERSION_NAME \
            --no-daemon \
            --warning-mode summary

      - name: Locate + rename APKs
        shell: bash
        run: |
          set -euo pipefail
          echo "=== all APKs produced ==="
          find android/onnowtv-kids/app/build/outputs/apk -name "*.apk" -type f -ls || true

          DBG=$(find android/onnowtv-kids/app/build/outputs/apk -name "*-debug.apk" -type f | head -n1)
          if [ -z "$DBG" ]; then
            echo "::error::No debug APK produced"
            exit 1
          fi
          cp "$DBG" "$GITHUB_WORKSPACE/onnowtv-kids-debug.apk"

          REL=$(find android/onnowtv-kids/app/build/outputs/apk -name "*-release.apk" -type f | head -n1)
          if [ -z "$REL" ]; then
            REL=$(find android/onnowtv-kids/app/build/outputs/apk -name "*-release-unsigned.apk" -type f | head -n1)
          fi
          if [ -n "$REL" ]; then
            cp "$REL" "$GITHUB_WORKSPACE/onnowtv-kids-release.apk"
          fi

      - name: Publish to GitHub Releases (kids-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kids-latest
          name: "ON NOW V2 Kids ${{ steps.version.outputs.VN }} (build ${{ steps.version.outputs.VC }})"
          body: |
            **ON NOW V2 Kids — standalone Kids-mode kiosk.**

            What's new:
              • Extracted out of Vesper TV — Kids is now its own APK with its own home / launcher entry.
              • Registers as `CATEGORY_HOME` so the HOME button on the remote routes back into Kids — kids cannot escape by pressing HOME.
              • Native 4-digit PIN gate on BACK / HOME / Settings.  Default PIN is `0000` — set a new one via Settings (left rail gear icon) on first run.
              • Left settings rail with single gear icon → enters `/kids/settings` only after PIN entry.

            Install:
            1. Download `onnowtv-kids-release.apk` (or `-debug.apk`) below.
            2. Sideload onto your TV box via `adb install` or a file-explorer.
            3. (Optional) Settings → Default apps → Home → choose ON NOW V2 Kids to lock HOME-button routing.
          files: |
            onnowtv-kids-debug.apk
            onnowtv-kids-release.apk
          fail_on_unmatched_files: false
          prerelease: true
          make_latest: 'false'

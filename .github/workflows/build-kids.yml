name: Build ON NOW V2 Kids APK

# Workflow:
#   1. Build the React app with the live REACT_APP_BACKEND_URL baked in
#      (so the bundled APK still talks to the deployed backend for
#      TMDB / Stremio addons).
#   2. Copy the build output into android/onnowtv-kids/app/src/main/assets/web/
#      so the WebView loads it from file:///android_asset/.
#   3. Build the debug APK.  Publish artifact + auto-update Release.

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: write   # needed by softprops/action-gh-release
  actions: write    # needed by the storage-cleanup step to delete old artifacts + runs

env:
  # Live deployed backend URL — the APK bakes this into the
  # production JS bundle, so the sideloaded app keeps fetching real
  # TMDB and addon data without any preview-URL dependency on the
  # frontend side.
  # v2.6.79: TEMPORARY rollback to the PREVIEW URL while the
  # production deployment at `rebrand-app-5.emergent.host` is
  # returning Cloudflare 520 / nginx 502.  Preview pod is rock-
  # solid so this keeps clients working while we (a) wait for
  # Emergent support to fix prod OR (b) migrate to a Contabo VPS.
  # Will swap to the Contabo domain (vesper.tv / similar) once
  # the VPS is provisioned.
  REACT_APP_BACKEND_URL: https://onnowtv.duckdns.org

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Yarn deps
        working-directory: frontend
        run: yarn install --network-timeout 600000

      - name: Build React app (production)
        working-directory: frontend
        env:
          CI: 'false'  # don't fail the build on lint warnings
          GENERATE_SOURCEMAP: 'false'
          DISABLE_ESLINT_PLUGIN: 'true'
        run: |
          yarn build
          echo "=== React build output: ==="
          ls -la build/
          echo "=== JS bundle: ==="
          ls -la build/static/js/ 2>/dev/null | head -5

      - name: Bundle frontend into Android assets
        run: |
          rm -rf android/onnowtv-kids/app/src/main/assets/web
          mkdir -p android/onnowtv-kids/app/src/main/assets/web
          cp -r frontend/build/. android/onnowtv-kids/app/src/main/assets/web/

          # --- Strip Emergent preview / PostHog telemetry from the
          # bundled index.html.  These scripts inject the "You're
          # viewing a static preview — Resume to interact" banner and
          # the "Made with Emergent" badge, both of which show up on
          # the sideloaded APK because the WebView fetches them over
          # the internet.  We want a clean, branded experience inside
          # the box, so we surgically remove them at bundle time.
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('android/onnowtv-kids/app/src/main/assets/web/index.html')
          html = p.read_text(encoding='utf-8')
          # 1) Remove the emergent-main.js loader script.
          html = re.sub(
              r'<script[^>]*assets\.emergent\.sh[^>]*></script>\s*',
              '', html, flags=re.IGNORECASE)
          # 2) Remove the "Made with Emergent" badge anchor element.
          html = re.sub(
              r'<a\s+id="emergent-badge"[\s\S]*?</a>\s*',
              '', html, flags=re.IGNORECASE)
          # 3) Remove the PostHog telemetry init script block.
          html = re.sub(
              r'<script>\s*!\(function\s*\([^)]*\)\s*\{[\s\S]*?posthog\.init\([\s\S]*?\}\);?\s*</script>\s*',
              '', html, flags=re.IGNORECASE)
          p.write_text(html, encoding='utf-8')
          print('=== index.html cleaned of Emergent / PostHog tracking ===')
          PY

          # --- v2.8.71 — Rewrite ABSOLUTE asset paths (`/static/...`,
          # `/brand/...`, `/favicon.ico` etc.) to RELATIVE paths
          # (`./static/...`, `./brand/...`) so they resolve when the
          # WebView loads `file:///android_asset/web/index.html`.
          #
          # CRA's `homepage: "/"` setting in `package.json` produces
          # absolute paths so the React app deployed to the VPS at
          # `https://onnowtv.duckdns.org/music/whatever` finds its
          # static assets correctly.  But the same `/static/js/...`
          # prefix resolves to `file:///static/js/...` inside the
          # APK — which doesn't exist — and the entire React bundle
          # silently fails to load.  The user sees the boot spinner
          # forever.  Symptom: `index.html` opens, root never mounts.
          # Fix: in-place rewrite the bundled HTML's asset paths to
          # be relative.  Doesn't touch any other URLs (https://...
          # external resources, query strings, etc.) — just `="/x..."`
          # → `="./x..."`.
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path('android/onnowtv-kids/app/src/main/assets/web/index.html')
          html = p.read_text(encoding='utf-8')
          before = html.count('="/')
          # Only rewrite roots that are clearly asset paths, never
          # external URLs (which start with `="//"` or `="https://"`
          # already, neither of which match the pattern below).
          html = re.sub(
              r'(\b(?:src|href|content)=)"/(?!/)([^"\s]*)"',
              r'\1"./\2"',
              html,
          )
          after = html.count('="/')
          p.write_text(html, encoding='utf-8')
          print(f'=== index.html absolute->relative paths: {before} → {after} ===')
          PY

          # --- Wrap each main JS chunk in try/catch so any runtime
          # failure on the box becomes a readable error string in the
          # boot splash diagnostic panel — instead of a CORS-masked
          # "Script error." with no message (the default behaviour
          # for any file:// loaded script on Android WebView).
          python3 - <<'PY'
          import pathlib, re
          js_dir = pathlib.Path('android/onnowtv-kids/app/src/main/assets/web/static/js')
          if not js_dir.exists():
              print('!! no static/js dir, skipping wrapper')
          else:
              # Wrap every entry/chunk so a runtime error in ANY of
              # them surfaces a readable message instead of the
              # CORS-masked "Script error.".  We skip ones already
              # tagged with /*WRAP*/ to stay idempotent if the
              # workflow ever re-runs against the same artifact.
              for f in sorted(js_dir.glob('*.js')):
                  if f.name.endswith('.LICENSE.txt'):
                      continue
                  body = f.read_text(encoding='utf-8')
                  if body.startswith('/*WRAP*/'):
                      continue
                  wrapped = (
                      "/*WRAP*/try{\n" + body + "\n}catch(e){\n"
                      "try{\n"
                      "  window.__bundleError = e;\n"
                      "  var stack = (e && (e.stack || e.message || String(e))) || 'unknown error';\n"
                      "  var t = document.getElementById('vesper-boot-title');\n"
                      "  var s = document.getElementById('vesper-boot-sub');\n"
                      "  var sp = document.getElementById('vesper-boot-spinner');\n"
                      "  if (t) t.innerHTML = \"ON NOW TV couldn't start\";\n"
                      "  if (s) s.innerHTML = "
                      "    \"<span style='font-size:12px;color:#A8B5C7;'>Real error from the JS bundle:</span><br/><br/>\""
                      "    + \"<pre style='text-align:left;font-size:10px;color:#FCA5A5;background:rgba(255,255,255,0.04);padding:12px;border-radius:8px;max-height:340px;overflow:auto;white-space:pre-wrap;word-break:break-all;'>\""
                      "    + (stack + '').replace(/</g,'&lt;')"
                      "    + \"</pre>\";\n"
                      "  if (sp) sp.style.display = 'none';\n"
                      "}catch(_){}\n"
                      "throw e;\n"
                      "}\n"
                  )
                  f.write_text(wrapped, encoding='utf-8')
                  print('wrapped:', f.name, 'size:', f.stat().st_size)
          PY

          echo "=== Bundled into APK assets: ==="
          ls -la android/onnowtv-kids/app/src/main/assets/web/ | head
          FILES=$(find android/onnowtv-kids/app/src/main/assets/web/ -type f | wc -l)
          echo "Total files: $FILES"
          # Fail fast if React build silently produced an empty folder
          if [ "$FILES" -lt 5 ]; then
            echo "❌ ERROR: bundled assets folder has fewer than 5 files — React build likely failed!"
            exit 1
          fi
          # Sanity check: index.html must exist and reference assets
          if [ ! -f android/onnowtv-kids/app/src/main/assets/web/index.html ]; then
            echo "❌ ERROR: index.html missing from bundled assets!"
            exit 1
          fi
          # Sanity check: emergent.sh script must be gone
          if grep -q "assets.emergent.sh" android/onnowtv-kids/app/src/main/assets/web/index.html; then
            echo "❌ ERROR: emergent script not stripped from index.html"
            exit 1
          fi
          # The id="emergent-badge" anchor element must be gone (we
          # still keep the CSS-selector string in our inline <style>
          # block as a runtime safety net, so we look for the
          # specific `id="emergent-badge"` attribute, not just the
          # bare substring).
          if grep -q 'id="emergent-badge"' android/onnowtv-kids/app/src/main/assets/web/index.html; then
            echo "❌ ERROR: emergent-badge anchor element not stripped from index.html"
            exit 1
          fi
          echo "=== index.html (sanitized) first 30 lines: ==="
          head -30 android/onnowtv-kids/app/src/main/assets/web/index.html

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle 8.7 distribution
        id: cache-gradle
        uses: actions/cache@v4
        with:
          path: ~/gradle-8.7
          key: gradle-dist-8.7-v1

      - name: Install Gradle 8.7 (with retries)
        shell: bash
        run: |
          # v2.10.6 — Previously used gradle/actions/setup-gradle@v3
          # which sporadically failed with "Error: Unexpected HTTP
          # response: 504" while downloading the Gradle
          # distribution.  The action has no retry knob, so we
          # install Gradle 8.7 manually with curl --retry 6
          # --retry-all-errors so transient 5xx errors on
          # services.gradle.org are automatically retried.  Cached
          # via actions/cache so subsequent runs skip the download
          # entirely.
          set -euo pipefail
          GRADLE_DIR="$HOME/gradle-8.7"
          if [ ! -x "$GRADLE_DIR/bin/gradle" ]; then
            cd "$HOME"
            curl -fL --retry 6 --retry-delay 10 --retry-all-errors \
              -o gradle.zip \
              "https://services.gradle.org/distributions/gradle-8.7-bin.zip"
            unzip -q gradle.zip
            rm gradle.zip
          fi
          echo "$GRADLE_DIR/bin" >> "$GITHUB_PATH"
          "$GRADLE_DIR/bin/gradle" --version

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3.2.2
        with:
          cmdline-tools-version: 12266719
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Generate gradle wrapper + local.properties
        working-directory: android/onnowtv-kids
        run: |
          # Point local.properties at the Android SDK that
          # setup-android@v3 installed.
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "=== local.properties ==="
          cat local.properties
          # Generate the gradlew wrapper using the Gradle from
          # setup-gradle@v3.
          gradle wrapper --gradle-version 8.7
          chmod +x ./gradlew
          ./gradlew --version

      - name: Derive versionName + versionCode from CHANGELOG
        id: ver
        run: |
          # Read the topmost `## v…` line in CHANGELOG.md so the
          # APK's versionName always matches the latest published
          # change.  The previous workflow hardcoded "2.7.28" and
          # never bumped, so the in-app update gate kept seeing
          # "running == latest" and silently never prompted users
          # to install new builds.  This step fixes that forever.
          VNAME=$(grep -m1 -E '^## v[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md | sed -E 's/^## v([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          if [ -z "$VNAME" ]; then
            echo "❌ Could not parse a version from CHANGELOG.md top heading"
            exit 1
          fi
          # versionCode = 200 + monotonically-increasing CI run number,
          # which guarantees a strictly higher integer on EVERY push
          # (Android requires versionCode to increase for upgrades).
          VCODE=$(( 200 + GITHUB_RUN_NUMBER ))
          echo "Detected versionName=$VNAME versionCode=$VCODE"
          echo "vname=$VNAME" >> "$GITHUB_OUTPUT"
          echo "vcode=$VCODE" >> "$GITHUB_OUTPUT"

          # Extract THIS version's release-notes block from CHANGELOG
          # — from "## v$VNAME" up to (but excluding) the next "## v".
          # Saved to a file so the gh-release step can read it via
          # `body_path:`, instead of stale hardcoded text below.
          awk -v ver="## v$VNAME" '
            $0 ~ ver { found=1; print; next }
            /^## v/  { if (found) exit }
            found    { print }
          ' CHANGELOG.md > release-notes.md
          echo "=== release-notes.md ==="
          head -40 release-notes.md

      - name: Build debug APK
        working-directory: android/onnowtv-kids
        run: ./gradlew assembleDebug --no-daemon --stacktrace -PversionName=${{ steps.ver.outputs.vname }} -PversionCode=${{ steps.ver.outputs.vcode }}

      - name: Locate APK
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f
          APK=$(find android -name "*-debug.apk" -type f | head -n1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK file found anywhere under android/"
            find android/onnowtv-kids/app/build -type d 2>/dev/null | head -20
            exit 1
          fi
          echo "Found APK at: $APK"
          cp "$APK" "$GITHUB_WORKSPACE/onnowtv-kids-debug.apk"
          ls -la "$GITHUB_WORKSPACE/onnowtv-kids-debug.apk"

      # v2.8.6 — Pre-delete the previously uploaded APK asset BEFORE
      # letting softprops/action-gh-release re-upload it.  The action's
      # built-in "delete then re-upload" path hits intermittent GitHub
      # API 5xx ("Server Error") on large (50+ MB) APK assets — it
      # surfaces as a fatal failure at the "Publish/update apk-latest
      # Release" step even though the Vesper build itself succeeded.
      #
      # By pre-deleting via `gh release delete-asset` with a 5-attempt
      # exponential-backoff retry loop, we keep the DELETE step under
      # OUR control (where we can retry) instead of inside the action
      # (where one 5xx aborts the entire workflow).  If the asset
      # doesn't exist yet (first run, or it was already deleted),
      # this step is a no-op.  The softprops step then only has to
      # do an UPLOAD, which is the reliable half of the API.
      - name: Delete previous apk-latest asset (with retries)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ASSET="onnowtv-kids-debug.apk"
          TAG="kids-latest"
          # If the release doesn't exist yet, nothing to delete.
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "Release $TAG does not exist yet — skipping pre-delete."
              exit 0
          fi
          # If the asset isn't on the release, nothing to delete.
          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
                  --json assets --jq '.assets[].name' | grep -qx "$ASSET"; then
              echo "Asset $ASSET not present on $TAG — skipping pre-delete."
              exit 0
          fi
          for attempt in 1 2 3 4 5; do
              echo "Attempt $attempt: deleting $ASSET from release $TAG…"
              if gh release delete-asset "$TAG" "$ASSET" \
                      --repo "$GITHUB_REPOSITORY" --yes; then
                  echo "Deleted previous $ASSET successfully."
                  exit 0
              fi
              # Confirm it's actually still there before retrying —
              # `gh` sometimes reports failure even though the delete
              # went through, in which case we're done.
              if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
                      --json assets --jq '.assets[].name' | grep -qx "$ASSET"; then
                  echo "Asset already gone after attempt $attempt — done."
                  exit 0
              fi
              sleep $((attempt * 4))
          done
          echo "WARNING: could not pre-delete $ASSET after 5 attempts — softprops will try its own delete."
          # Don't fail the workflow here — let softprops try anyway.
          exit 0

      - name: Publish/update "apk-latest" Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: kids-latest
          name: ON NOW TV V2 — v${{ steps.ver.outputs.vname }}
          # Release notes are auto-generated from CHANGELOG.md
          # (release-notes.md was produced by the "Derive versionName"
          # step above).  We prepend a small install-help block so the
          # user always sees how to sideload.
          body_path: release-notes.md
          files: onnowtv-kids-debug.apk
          prerelease: true
          make_latest: 'false'

      # ─────────────────────────────────────────────────────────────
      # Storage cleanup — keeps the repo from filling up with old
      # workflow artifacts.  The workflow uploads the APK to the
      # `apk-latest` release ONLY (we dropped the duplicate
      # `actions/upload-artifact` step); this step then deletes any
      # leftover artifacts older than 1 day and prunes succeeded
      # workflow runs older than 7 days so the user's account never
      # bumps into GitHub's free-tier storage cap.
      # Uses the built-in GITHUB_TOKEN — no PAT required.
      # ─────────────────────────────────────────────────────────────
      - name: Prune old workflow artifacts and runs
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const DAY = 24 * 60 * 60 * 1000;
            const now = Date.now();

            // 1) Delete artifacts older than 1 day (catches anything
            //    left over from older runs that used retention-days > 0).
            try {
              let page = 1;
              while (true) {
                const { data } = await github.rest.actions.listArtifactsForRepo({
                  owner, repo, per_page: 100, page,
                });
                if (!data.artifacts || data.artifacts.length === 0) break;
                for (const art of data.artifacts) {
                  const age = now - new Date(art.created_at).getTime();
                  if (age > 1 * DAY) {
                    try {
                      await github.rest.actions.deleteArtifact({
                        owner, repo, artifact_id: art.id,
                      });
                      core.info(`Deleted artifact ${art.id} (${art.name}, age ${Math.round(age/DAY)}d)`);
                    } catch (e) {
                      core.warning(`Failed to delete artifact ${art.id}: ${e.message}`);
                    }
                  }
                }
                if (data.artifacts.length < 100) break;
                page += 1;
                if (page > 20) break; // safety
              }
            } catch (e) {
              core.warning(`Artifact prune failed: ${e.message}`);
            }

            // 2) Delete completed workflow runs older than 7 days for
            //    this same workflow file.  Keeps the run history short
            //    so logs + caches stay under the free-tier cap.
            try {
              const workflow_id = 'build-apk.yml';
              let page = 1;
              while (true) {
                const { data } = await github.rest.actions.listWorkflowRuns({
                  owner, repo, workflow_id, per_page: 100, page,
                });
                if (!data.workflow_runs || data.workflow_runs.length === 0) break;
                for (const run of data.workflow_runs) {
                  if (run.status !== 'completed') continue;
                  const age = now - new Date(run.created_at).getTime();
                  if (age > 7 * DAY) {
                    try {
                      await github.rest.actions.deleteWorkflowRun({
                        owner, repo, run_id: run.id,
                      });
                      core.info(`Deleted workflow run ${run.id} (age ${Math.round(age/DAY)}d)`);
                    } catch (e) {
                      core.warning(`Failed to delete run ${run.id}: ${e.message}`);
                    }
                  }
                }
                if (data.workflow_runs.length < 100) break;
                page += 1;
                if (page > 20) break;
              }
            } catch (e) {
              core.warning(`Run prune failed: ${e.message}`);
            }

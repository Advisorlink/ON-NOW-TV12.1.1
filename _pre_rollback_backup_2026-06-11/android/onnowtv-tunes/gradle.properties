org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# v2.8.51 — Force AGP to feed the FULL classpath (including all
# transitive dependencies like Rhino, NanoJson, etc.) into the
# desugaring dexing transform.  Without this, `coreLibraryDesugaring`
# only touches the app module's own bytecode + direct deps, so the
# URLEncoder.encode(String, Charset) call inside NewPipeExtractor's
# transitive deps was NOT being rewritten — causing the
# `NoSuchMethodError` we hit on Android 9-12.
android.useFullClasspathForDexingTransform=true
